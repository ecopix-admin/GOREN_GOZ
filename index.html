<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sham-Cell Pro</title>
    <style>
        :root { --dark: #0b141a; --gray: #202c33; --green: #00a884; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background: var(--dark); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
            position: fixed; /* Ekranın sürüşməsini tam dayandırır */
        }
        
        #app { 
            display: flex; flex-direction: column; 
            height: 100dvh; /* Dynamic Viewport Height - Mobil brauzerlər üçün ən dəqiq ölçü */
            width: 100%;
        }
        
        .header { 
            height: 60px; background: var(--gray); padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #333; flex-shrink: 0;
        }
        .id-badge { background: var(--green); padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 14px; }

        .messages-area { 
            flex: 1; padding: 15px; 
            overflow-y: auto; 
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
            display: flex; flex-direction: column;
            padding-bottom: 80px; /* Alt panelin mesajları örtməməsi üçün */
        }
        
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; max-width: 85%; font-size: 15px; }
        .msg.received { background: var(--gray); align-self: flex-start; }
        .msg.sent { background: #005c4b; align-self: flex-end; }

        /* ALT PANEL - MÜTLƏQ SABİTLƏMƏ */
        .input-bar { 
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: var(--gray); padding: 10px; 
            display: flex; align-items: center; gap: 8px;
            border-top: 1px solid #333;
            z-index: 999;
        }
        
        input { 
            background: #2a3942; border: none; padding: 12px; 
            color: white; border-radius: 20px; outline: none; font-size: 16px;
        }
        #target-id { width: 65px; text-align: center; flex-shrink: 0; }
        #msg-text { flex: 1; min-width: 0; }

        .btn-round { 
            background: var(--green); border: none; 
            width: 45px; height: 45px; border-radius: 50%; 
            color: white; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* Zəng Ekranı */
        #call-screen { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: var(--dark); 
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div><b>Sham-Cell</b> <span style="font-size: 10px; color: var(--green);">● Online</span></div>
        <div class="id-badge">ID: <span id="my-id">...</span></div>
    </div>

    <div class="messages-area" id="msg-display">
        <div class="msg received">Sham-Cell sisteminə xoş gəldiniz. Boru və ya kabel vasitəsilə rabitə üçün hazırsınız.</div>
    </div>
    
    <div class="input-bar">
        <input type="number" id="target-id" placeholder="ID" inputmode="numeric">
        <input type="text" id="msg-text" placeholder="Mesaj...">
        <button class="btn-round" onclick="sendMessage()">➤</button>
        <button class="btn-round" style="background: #2196F3;" onclick="startCall()">📞</button>
    </div>
</div>

<div id="call-screen">
    <h1 id="call-info">ZƏNG GƏLİR...</h1>
    <div id="call-id" style="font-size: 20px; color: #8696a0;">ID: ----</div>
    <div style="display: flex; margin-top: 50px;">
        <button class="btn-round" style="width:70px; height:70px; background:var(--green);" id="ans-btn" onclick="acceptCall()">✔</button>
        <button class="btn-round" style="width:70px; height:70px; background:#ea0038; margin-left:20px;" onclick="endCall()">✖</button>
    </div>
</div>

<script>
    // ID-ni yaddaşda saxla ki, hər dəfə dəyişməsin
    let myId = localStorage.getItem('sham_id') || Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('sham_id', myId);
    document.getElementById('my-id').innerText = myId;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function sendMessage() {
        const tid = document.getElementById('target-id').value;
        const txt = document.getElementById('msg-text').value;
        if(!tid || !txt) return;

        const area = document.getElementById('msg-display');
        area.innerHTML += `<div class="msg sent"><b>ID ${tid}:</b><br>${txt}</div>`;
        area.scrollTop = area.scrollHeight;
        
        // Akustik siqnal (19kHz)
        const osc = audioCtx.createOscillator();
        osc.frequency.value = 19000;
        osc.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        
        document.getElementById('msg-text').value = "";
    }

    function startCall() {
        const tid = document.getElementById('target-id').value;
        if(!tid) return alert("Hədəf ID daxil edin!");
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('call-id').innerText = "ID: " + tid;
    }

    function endCall() { document.getElementById('call-screen').style.display = 'none'; }
    function acceptCall() { document.getElementById('call-info').innerText = "DANIŞIQ..."; }

    // Mikrofon Dinləyicisi
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 2048;
            source.connect(analyzer);
            const data = new Uint8Array(analyzer.frequencyBinCount);

            function check() {
                analyzer.getByteFrequencyData(data);
                const idx = Math.round(18000 / (audioCtx.sampleRate / analyzer.fftSize));
                if (data[idx] > 150) { 
                    document.getElementById('call-screen').style.display = 'flex';
                    document.getElementById('call-info').innerText = "ZƏNG GƏLİR!";
                }
                requestAnimationFrame(check);
            }
            check();
        } catch(e) {}
    }
    window.onload = init;
</script>
</body>
</html>
