<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - AR Social Network</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 5 Saniyəlik Bildiriş */
        #push-notif {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 242, 234, 0.9); color: #000; padding: 12px 25px;
            border-radius: 20px; font-weight: bold; z-index: 5000; display: none;
            box-shadow: 0 0 15px #00f2ea; text-align: center; width: 80%;
        }

        /* Ürək Partlayışı Effekti */
        #heart-burst {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; color: rgba(255, 0, 80, 0.7); display: none;
            z-index: 4000; pointer-events: none;
            animation: burst 1.5s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Alt Menyu */
        .bottom-bar {
            position: fixed; bottom: 20px; width: 100%; display: flex;
            justify-content: center; z-index: 2000;
        }
        .input-box {
            width: 85%; background: rgba(0,0,0,0.85); border-radius: 30px;
            padding: 10px 15px; border: 2px solid #00f2ea; display: flex; align-items: center;
        }
        #msg-in { flex: 1; background: transparent; border: none; color: white; outline: none; }
        #send-btn { background: #ff0050; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; }

        /* Rəy Paneli */
        #comment-ui {
            position: fixed; bottom: 100px; background: white; width: 90%; left: 5%;
            padding: 15px; border-radius: 20px; display: none; z-index: 3000;
        }
    </style>
</head>

<body>

    <div id="push-notif"></div>
    <div id="heart-burst"><i class="fas fa-heart"></i></div>

    <div id="comment-ui">
        <input type="text" id="comm-val" placeholder="Şərh yazın..." style="width:75%; padding:10px;">
        <button onclick="postComm()" style="background:#ff0050; color:white; border:none; padding:10px;">Yaz</button>
        <button onclick="likeObj()" style="background:#00f2ea; border:none; padding:10px;"><i class="fas fa-heart"></i></button>
        <button onclick="document.getElementById('comment-ui').style.display='none'" style="width:100%; margin-top:5px;">Bağla</button>
    </div>

    <div class="bottom-bar">
        <div class="input-box">
            <input type="text" id="msg-in" placeholder="Məkana iz burax...">
            <label for="f-up"><i class="fas fa-camera" style="color:#00f2ea;"></i></label>
            <input type="file" id="f-up" style="display:none">
        </div>
        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera rotation-reader fov="80"></a-camera>
        <a-entity id="ar-scene"></a-entity>
    </a-scene>

    <script>
        const BOT_TOKEN = "8799012820:AAEPVV76TIkjw9L_Jh6DUqpNHGBdMLd770A";
        const CHAT_ID = "@vidosmarkarxiv";
        let cLat, cLon, activeId = null;

        navigator.geolocation.watchPosition(p => {
            cLat = p.coords.latitude;
            cLon = p.coords.longitude;
        }, null, {enableHighAccuracy: true});

        async function tgPush(msg) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        function showPush(text) {
            const n = document.getElementById('push-notif');
            n.innerText = text;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 5000);
        }

        document.getElementById('send-btn').onclick = () => {
            const val = document.getElementById('msg-in').value;
            if(!val) return;
            const id = Date.now();
            tgPush(`IZ_YARADILDI|ID:${id}|Kordinat:${cLat},${cLon}|Mesaj:${val}`);
            createAR(id, val, cLat, cLon);
            document.getElementById('msg-in').value = "";
        };

        function createAR(id, msg, lat, lon) {
            const scene = document.getElementById('ar-scene');
            const entity = document.createElement('a-entity');
            entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon}`);
            entity.setAttribute('look-at', '[gps-camera]');
            entity.setAttribute('position', '0 1.6 0');

            const box = document.createElement('a-box');
            box.setAttribute('width', '2'); box.setAttribute('height', '0.7'); box.setAttribute('color', '#1a1a1a');
            
            const txt = document.createElement('a-text');
            txt.setAttribute('value', msg); txt.setAttribute('align', 'center'); txt.setAttribute('position', '0 0 0.06');
            
            box.onclick = () => {
                activeId = id;
                document.getElementById('comment-ui').style.display = 'block';
            };

            box.appendChild(txt);
            entity.appendChild(box);
            scene.appendChild(entity);
        }

        function likeObj() {
            const heart = document.getElementById('heart-burst');
            heart.style.display = 'block';
            setTimeout(() => heart.style.display = 'none', 1500);
            tgPush(`BƏYƏNİ|ID:${activeId}|Məkan:${cLat},${cLon}`);
            showPush("Filan yerdəki izinizə bəyəni gəldi!");
        }

        function postComm() {
            const c = document.getElementById('comm-val').value;
            tgPush(`ŞƏRH|ID:${activeId}|Yazı:${c}`);
            showPush("İzinizə şərh yazıldı: " + c);
            document.getElementById('comment-ui').style.display = 'none';
        }
    </script>
</body>
</html>
