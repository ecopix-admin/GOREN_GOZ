<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | SCAN MODE</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Giriş Paneli */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; color: white; transition: 0.5s;
        }

        .scan-btn {
            width: 100px; height: 100px; border-radius: 50%;
            background: #00f2fe; border: none; cursor: pointer;
            box-shadow: 0 0 20px #00f2fe; font-weight: bold; font-size: 16px;
        }
    </style>
</head>

<body>

    <div id="welcome-screen">
        <h1 style="letter-spacing: 3px;">GÖRƏN GÖZ</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Kameranı açmaq üçün düyməyə sıxın</p>
        <button class="scan-btn" onclick="activateScanner()">SKAN ET</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-logo" src="https://img.icons8.com/color/512/tiktok.png">
            <video id="reklam-video" src="https://www.w3schools.com/html/mov_bbb.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader fov="80"></a-camera>

        <a-entity gps-entity-place="latitude: 40.437298; longitude: 49.865704;">
            
            <a-entity position="0 1.6 0" scale="5 5 5">
                
                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                    <a-image src="#tk-logo" width="1" height="1" class="clickable" 
                             onclick="goToLink()"></a-image>
                </a-entity>

                <a-video src="#reklam-video" width="1.8" height="1" position="0 1.2 0" 
                         material="shader: flat; side: double;"></a-video>
                
                <a-text value="SAMXAL PRO" align="center" position="0 -0.8 0" width="3" color="#fff"></a-text>
            </a-entity>

            <a-ring color="#00f2fe" radius-inner="0.4" radius-outer="0.5" rotation="-90 0 0" position="0 -1.5 0" opacity="0.4"></a-ring>

        </a-entity>

    </a-scene>

    <script>
        function activateScanner() {
            // Səhifəni açır amma tiktoka getmir
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                // Videonu işə salır (havada oynasın deyə)
                var v = document.querySelector('#reklam-video');
                if(v) v.play();
            }, 500);
        }

        function goToLink() {
            // Yalnız loqoya basanda bu işləyəcək
            window.location.href = "https://www.tiktok.com";
        }

        // Yüksək dəqiqlikli GPS-i aktivləşdiririk
        navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        });
    </script>
</body>
</html>
