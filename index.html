<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - SMART AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        /* Tam ekran video rejimi üçün dizayn */
        #fullscreen-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; justify-content: center; align-items: center;
        }
        #fullscreen-video { width: 100%; max-height: 80%; border: 2px solid #ff0050; }
        #close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="fullscreen-container">
        <span id="close-btn" onclick="closeFullscreen()">× Bağla</span>
        <video id="fullscreen-video" controls playsinline></video>
        <div style="position: absolute; bottom: 50px; color: white; text-align: center; width: 100%; font-family: sans-serif;">
            <h2 id="video-title">İz Tapıldı!</h2>
            <p id="video-desc">Video artıq telefonunuzda oynayır.</p>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="my-video" src="iz.mp4" loop="true" crossorigin="anonymous" playsinline muted autoplay></video>
        </a-assets>

        <a-camera gps-camera="minDistance: 1;" rotation-reader fov="90"></a-camera>

        <a-entity 
            id="ar-element"
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="15 15 15" 
            look-at="[gps-camera]">
            
            <a-video src="#my-video" width="4" height="2.25" material="shader: flat; side: double;"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const arEntity = document.querySelector('#ar-element');
        const fsContainer = document.querySelector('#fullscreen-container');
        const fsVideo = document.querySelector('#fullscreen-video');
        const mainVideo = document.querySelector('#my-video');

        // Məsafəni hər saniyə yoxla
        setInterval(() => {
            // AR.js tərəfindən hesablanan məsafəni götürürük
            const distance = arEntity.getAttribute('distance');
            
            // Əgər məsafə 15 metrdən azdırsa, tam ekrana keç
            if (distance && distance < 15) {
                openFullscreen();
            }
        }, 1000);

        function openFullscreen() {
            if (fsContainer.style.display !== 'flex') {
                fsContainer.style.display = 'flex';
                fsVideo.src = mainVideo.src;
                fsVideo.currentTime = mainVideo.currentTime;
                fsVideo.play();
                mainVideo.pause(); // AR-dakı videonu dayandır ki, resurs getməsin
            }
        }

        function closeFullscreen() {
            fsContainer.style.display = 'none';
            fsVideo.pause();
            mainVideo.play();
        }

        // İlk toxunuşda səsi aç və başlat
        window.onclick = function() {
            mainVideo.muted = false;
            mainVideo.play();
        };
    </script>
</body>
</html>
