<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | PRECISION AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #welcome {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; align-items: center; 
            justify-content: center; z-index: 9999;
        }
        .start-btn {
            width: 120px; height: 120px; border-radius: 50%; background: #fff;
            color: #000; border: none; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px #fff; font-size: 18px;
        }
    </style>
</head>

<body>

    <div id="welcome">
        <button class="start-btn" onclick="this.parentElement.style.display='none'">BAŞLA</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-logo" src="https://img.icons8.com/color/512/tiktok.png">
            <img id="user-img" src="https://i.pravatar.cc/300">
        </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader fov="80"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 1.5 0" scale="6 6 6" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                
                <a-image src="#tk-logo" width="1" height="1" class="clickable" 
                         onclick="window.location.href='https://www.tiktok.com/@tiktok'"></a-image>
                
                <a-circle src="#user-img" radius="0.22" position="0 0 0.02"></a-circle>
                
                <a-text value="SAMXAL" align="center" position="0 -0.7 0.1" width="3" color="#fff"></a-text>
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        // Səhifənin özbaşına açılmaması üçün window.onclick-i ləğv etdik.
        // Artıq keçid yalnız A-Frame daxilindəki .clickable obyektlərinə toxunanda baş verəcək.
    </script>
</body>
</html>
