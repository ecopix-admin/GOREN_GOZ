<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }

        /* Səhifələr */
        .page { display: none; height: 100vh; width: 100%; position: relative; }
        .active { display: block; }

        /* --- ANA SƏHİFƏ --- */
        .feed-container { height: 100%; position: relative; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .live-overlay-card { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border-left: 5px solid #ff0050; cursor: pointer; text-align: center; }
        .live-tag { background: #ff0050; font-size: 12px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-weight: bold; }

        /* --- CANLI YAYIM DAXİLİ --- */
        .live-container { height: 100%; background: linear-gradient(to bottom, #1e3a5f, #000); position: relative; overflow: hidden; }
        
        /* Klik sahəsi (Ürəklər üçün) */
        #click-area { position: absolute; top: 0; left: 0; width: 100%; height: 85%; z-index: 5; }

        /* Header */
        .live-header { position: absolute; top: 20px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .user-info { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: #444; border: 2px solid #ff0050; }
        .follow-btn { background: #ff0050; border: none; color: white; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .viewer-stats { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 20px; }

        /* Canlı Çat (Şəffaf və Uçan) */
        .live-chat { position: absolute; bottom: 100px; left: 15px; width: 70%; max-height: 200px; overflow-y: hidden; display: flex; flex-direction: column; gap: 10px; z-index: 10; pointer-events: none; }
        .chat-msg { background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 15px; font-size: 14px; animation: msgIn 0.3s ease-out; max-width: 90%; }
        .chat-msg b { color: #82b1ff; }
        .chat-msg.join { color: #ffeb3b; background: rgba(255, 235, 59, 0.1); }

        /* Footer */
        .live-footer { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 10; }
        .comment-input { background: rgba(255,255,255,0.15); border: none; border-radius: 25px; padding: 12px 20px; color: white; width: 50%; outline: none; font-size: 15px; }
        .footer-icons { display: flex; gap: 20px; font-size: 28px; }
        .icon-btn { cursor: pointer; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(1.2); }

        /* Animasiyalar */
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .heart-particle { position: absolute; pointer-events: none; animation: heartFly 1.5s ease-out forwards; z-index: 100; }
        @keyframes heartFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) translateX(var(--dx)) scale(1.5) rotate(var(--rg)); opacity: 0; }
        }

        .gift-burst { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; animation: giftPop 1s ease-out forwards; z-index: 110; pointer-events: none; display: none; }
        @keyframes giftPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="gift-burst" class="gift-burst">🎁🔥</div>

    <div id="feed-page" class="page active">
        <div class="feed-container">
            <div class="live-overlay-card" onclick="goToLive()">
                <div class="live-tag">CANLI</div>
                <div style="font-weight:bold; font-size:18px">Volkman1001</div>
                <div style="font-size:14px; opacity:0.8; margin: 5px 0 15px 0">Dünya Turu - Japonya 🇯🇵</div>
                <div style="font-size:14px; color: #fe2c55">📊 İzelemek üçün dokun</div>
            </div>
        </div>
    </div>

    <div id="live-page" class="page">
        <div class="live-container">
            <div id="click-area" onclick="spawnHeart(event)"></div>

            <div class="live-header">
                <div class="user-info">
                    <div class="user-avatar"></div>
                    <div>
                        <div style="font-size:13px; font-weight:bold">Volkman1001</div>
                        <div style="font-size:11px">❤️ <span id="like-counter">130.7</span>K</div>
                    </div>
                    <button class="follow-btn">+ Takip et</button>
                </div>
                <div class="viewer-stats">
                    <span style="font-size:14px">👁️ 1.1K</span>
                    <i class="fas fa-times icon-btn" onclick="goBack()" style="font-size:24px"></i>
                </div>
            </div>

            <div class="live-chat" id="chat">
                <div class="chat-msg"><b>İlayda:</b> Salam, necesiniz? 👋</div>
                <div class="chat-msg"><b>Luis:</b> Bu hansı şeherdir?</div>
                <div class="chat-msg join">Fatoş katıldı! ✨</div>
            </div>

            <div class="live-footer">
                <input type="text" class="comment-input" placeholder="Yazın...">
                <div class="footer-icons">
                    <i class="fas fa-gift icon-btn" style="color:#ff0050" onclick="sendGift()"></i>
                    <i class="fas fa-heart icon-btn" style="color:#ff0050" onclick="spawnHeart(event, true)"></i>
                    <i class="fas fa-share icon-btn" style="color:white"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let likeCount = 130.7;

        function goToLive() {
            document.getElementById('feed-page').classList.remove('active');
            document.getElementById('live-page').classList.add('active');
        }

        function goBack() {
            document.getElementById('live-page').classList.remove('active');
            document.getElementById('feed-page').classList.add('active');
        }

        function spawnHeart(event, fromButton = false) {
            // Sayğacı artır (vizual)
            likeCount += 0.1;
            document.getElementById('like-counter').innerText = likeCount.toFixed(1);

            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart-particle';
            
            // Koordinatları təyin et
            let x, y;
            if (fromButton) {
                // Düymədən gəlirsə, düymənin yerindən başla
                const btn = event.target.getBoundingClientRect();
                x = btn.left + btn.width / 2;
                y = btn.top;
            } else {
                // Ekrana kliklənibsə, klik yerindən başla
                x = event.clientX;
                y = event.clientY;
            }

            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            
            // Təsadüfi uçuş istiqaməti
            heart.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
            heart.style.setProperty('--rg', (Math.random() * 40 - 20) + 'deg');
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function sendGift() {
            // Ekranda partlayış animasiyası
            const burst = document.getElementById('gift-burst');
            burst.style.display = 'block';
            setTimeout(() => burst.style.display = 'none', 1000);

            // Çata mesaj əlavə et
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.style.background = 'linear-gradient(90deg, #ff0050, transparent)';
            msg.innerHTML = '<b>Siz:</b> Hediye gönderdi! 🎁🔥';
            document.getElementById('chat').appendChild(msg);
            
            // Avtomatik aşağı sürüşdür
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
