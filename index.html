<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Görən Göz - WA Messencer AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Ekranın qaralmaması üçün vacib düzəlişlər */
        body { margin: 0; overflow: hidden; background-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        /* Kameranın görünməsini təmin edən qat */
        .a-canvas { position: absolute; z-index: 0; }
        video { position: absolute; top: 0; left: 0; z-index: -1 !important; width: 100% !important; height: 100% !important; object-fit: cover; }

        /* WhatsApp Üst Panel */
        .wa-header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: #075E54; color: white; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; box-sizing: border-box;
        }

        #gps-info { font-size: 11px; font-family: monospace; }

        /* WhatsApp Alt Input Paneli */
        .wa-footer {
            position: fixed; bottom: 15px; width: 100%;
            display: flex; align-items: flex-end; padding: 0 10px;
            z-index: 2000; gap: 8px; box-sizing: border-box;
        }

        .input-pill {
            flex: 1; background: white; border-radius: 25px;
            display: flex; align-items: center; padding: 5px 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); min-height: 48px;
        }

        #msg-input {
            flex: 1; border: none; outline: none; padding: 10px;
            font-size: 16px; background: transparent;
        }

        .wa-icon { color: #8696a0; font-size: 20px; cursor: pointer; padding: 8px; }

        .send-circle {
            background: #128C7E; color: white; width: 50px; height: 50px;
            border-radius: 50%; border: none; display: flex;
            align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); flex-shrink: 0;
        }

        /* Uçan Ürək Animasiyası */
        #heart-anim {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 180px; color: #ff2e63; display: none; z-index: 3000;
            pointer-events: none; animation: wa-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes wa-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* Rəy Paneli */
        #reaction-panel {
            position: fixed; bottom: 85px; left: 5%; width: 90%;
            background: #f0f2f5; border-radius: 20px; display: none;
            padding: 15px; z-index: 2500; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

    <div class="wa-header">
        <div style="font-weight: 600;">Görən Göz v.3.4</div>
        <div id="gps-info"><i class="fas fa-satellite"></i> GPS Axtarılır...</div>
    </div>

    <div id="heart-anim"><i class="fas fa-heart"></i></div>

    <div id="reaction-panel">
        <div style="background:white; border-radius:10px; padding:10px; margin-bottom:10px;">
            <input type="text" id="comm-txt" placeholder="Rəy yazın..." style="width:100%; border:none; outline:none; font-size:16px;">
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="sendSocial('COMMENT')" style="flex:2; background:#128C7E; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Rəy Bildir</button>
            <button onclick="sendSocial('LIKE')" style="flex:1; background:#ff2e63; color:white; border:none; border-radius:10px;"><i class="fas fa-heart"></i></button>
        </div>
        <center><button onclick="document.getElementById('reaction-panel').style.display='none'" style="background:none; border:none; color:#666; margin-top:10px;">Bağla</button></center>
    </div>

    <div class="wa-footer">
        <div class="input-pill">
            <i class="fas fa-smile wa-icon"></i>
            <input type="text" id="msg-input" placeholder="Mesaj yazın...">
            <label for="file-up"><i class="fas fa-paperclip wa-icon"></i></label>
            <input type="file" id="file-up" accept="audio/*" style="display:none;">
            <i class="fas fa-microphone wa-icon" id="mic-btn"></i>
        </div>
        <button class="send-circle" id="post-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-camera gps-camera="minDistance: 1;" rotation-reader>
            <a-cursor color="#128C7E" scale="2 2 2"></a-cursor>
        </a-camera>
        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        const TOKEN = "8799012820:AAEPVV76TIkjw9L_Jh6DUqpNHGBdMLd770A";
        const CHAT = "@vidosmarkarxiv";
        let lat, lon, activeID = null;

        navigator.geolocation.watchPosition(p => {
            lat = p.coords.latitude;
            lon = p.coords.longitude;
            document.getElementById('gps-info').innerHTML = `<i class="fas fa-location-arrow"></i> Xəta: ${p.coords.accuracy.toFixed(1)}m`;
        }, null, {enableHighAccuracy: true});

        function tg(m) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(m)}`);
        }

        function createAR(val, type='text') {
            if(!lat) return;
            const id = Date.now();
            const el = document.createElement('a-entity');
            el.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon}`);
            el.setAttribute('look-at', '[gps-camera]');
            el.setAttribute('scale', '15 15 15');
            
            const box = document.createElement('a-box');
            box.setAttribute('width', '2.5'); box.setAttribute('height', '0.7');
            box.setAttribute('color', '#ffffff');
            box.onclick = () => { activeID = id; document.getElementById('reaction-panel').style.display='block'; };

            const t = document.createElement('a-text');
            t.setAttribute('value', val.substring(0,20));
            t.setAttribute('color', '#000'); t.setAttribute('align', 'center'); t.setAttribute('width', '4');

            box.appendChild(t); el.appendChild(box);
            document.getElementById('world').appendChild(el);
            tg(`YENİ İZ|ID:${id}|Məkan:${lat},${lon}`);
        }

        function sendSocial(type) {
            if(type === 'LIKE') {
                const h = document.getElementById('heart-anim');
                h.style.display = 'block'; setTimeout(() => h.style.display = 'none', 800);
                tg(`❤️ BƏYƏNİ|ID:${activeID}`);
            } else {
                const c = document.getElementById('comm-txt').value;
                if(c) { tg(`💬 ŞƏRH|ID:${activeID}|Rəy:${c}`); document.getElementById('comm-txt').value=""; }
            }
            document.getElementById('reaction-panel').style.display = 'none';
        }

        document.getElementById('post-btn').onclick = () => {
            const v = document.getElementById('msg-input').value;
            if(v) { createAR(v); document.getElementById('msg-input').value = ""; }
        };
    </script>
</body>
</html>
