<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | NEW LOCATION</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; align-items: center; 
            justify-content: center; z-index: 9999; text-align: center;
        }
        .btn { padding: 15px 45px; border-radius: 35px; background: #00f2fe; border: none; font-weight: bold; cursor: pointer; color: #000; font-size: 18px; box-shadow: 0 0 20px #00f2fe; }
    </style>
</head>

<body>

    <div id="overlay">
        <div>
            <h1>GÖRƏN GÖZ</h1>
            <p style="opacity: 0.6; margin-bottom: 30px;">Yeni koordinat yükləndi</p>
            <button class="btn" onclick="startAR()">SKAN ET</button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-logo" src="https://img.icons8.com/color/512/tiktok.png">
            <video id="web-video" 
                   src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <a-camera gps-camera="minDistance: 1; positionMinAccuracy: 100;" rotation-reader fov="60"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 1.5 0" scale="5 5 5">
                
                <a-video src="#web-video" width="2" height="1.1" position="0 1.3 0" 
                         material="shader: flat; side: double;"></a-video>

                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                    <a-image src="#tk-logo" width="0.8" height="0.8" 
                             class="clickable" 
                             onclick="event.stopPropagation(); window.location.href='https://www.tiktok.com'"></a-image>
                </a-entity>
                
                <a-text value="ZEYTUN LOCATION" align="center" position="0 -0.8 0" width="3" color="#fff"></a-text>
            </a-entity>

            <a-ring color="#00f2fe" radius-inner="0.4" radius-outer="0.5" rotation="-90 0 0" position="0 -1.5 0" opacity="0.6"></a-ring>

        </a-entity>

    </a-scene>

    <script>
        function startAR() {
            document.getElementById('overlay').style.display = 'none';
            var v = document.querySelector('#web-video');
            if(v) v.play();
        }

        // GPS dəqiqliyi üçün
        navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    </script>
</body>
</html>
