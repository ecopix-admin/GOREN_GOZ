<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görən Göz - Canlı PK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; color: white; overflow: hidden; }

        /* PK Sayğacı (Top Bar) */
        .pk-header { position: absolute; top: 70px; width: 94%; left: 3%; z-index: 100; }
        .pk-bar { height: 12px; display: flex; border-radius: 6px; overflow: hidden; background: #333; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .blue-part { background: #00f2ea; width: 50%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .red-part { background: #ff0050; width: 50%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pk-scores { display: flex; justify-content: space-between; margin-top: 5px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px #000; }

        /* İkilik Video Sahəsi */
        .live-split-screen { display: flex; height: 100vh; width: 100%; position: relative; }
        .host-half { flex: 1; background: #1a1a1a; border-right: 1px solid #333; position: relative; overflow: hidden; }
        .guest-half { flex: 1; background: #111; position: relative; overflow: hidden; }
        
        .host-label { position: absolute; bottom: 10px; left: 10px; font-size: 12px; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; }

        /* Düymələr və İnterfeys */
        .side-icons { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 110; }
        .icon-btn { font-size: 28px; text-align: center; cursor: pointer; }
        .icon-btn span { display: block; font-size: 10px; margin-top: 4px; }

        .chat-overlay { position: absolute; bottom: 90px; left: 10px; width: 65%; max-height: 150px; overflow: hidden; z-index: 100; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; animation: slideIn 0.3s; }

        /* Ürək Animasiyası */
        .heart { position: absolute; pointer-events: none; animation: fly 1.5s linear forwards; font-size: 24px; z-index: 200; }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-400px) translateX(var(--x)) rotate(var(--r)) scale(2); opacity: 0; }
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } }

        /* PK Vaxtı */
        .pk-timer { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(255,0,80,0.8); padding: 2px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <div class="pk-timer">PK 04:59</div>

    <div class="pk-header">
        <div class="pk-bar">
            <div id="blue-bar" class="blue-part"></div>
            <div id="red-bar" class="red-part"></div>
        </div>
        <div class="pk-scores">
            <span id="blue-score">1250</span>
            <span id="red-score">1250</span>
        </div>
    </div>

    <div class="live-split-screen" id="click-zone" onclick="sendHeart(event)">
        <div class="host-half">
            <div id="local-video" style="width:100%; height:100%; background: #222;"></div>
            <div class="host-label">Sən (Host)</div>
        </div>
        <div class="guest-half">
            <div id="remote-video" style="width:100%; height:100%; background: #111;"></div>
            <div class="host-label">Rəqib (Guest)</div>
        </div>
    </div>

    <div class="chat-overlay" id="chat">
        <div class="msg"><b>Gamer99:</b> Mavi tərəf udur! 🚀</div>
        <div class="msg"><b>Ayxan:</b> Rəqib çox güclüdür.</div>
    </div>

    <div class="side-icons">
        <div class="icon-btn" onclick="addScore('blue', 100)">🎁<span>Mavi</span></div>
        <div class="icon-btn" onclick="addScore('red', 100)">🎁<span>Qırmızı</span></div>
        <div class="icon-btn">💬<span>24</span></div>
        <div class="icon-btn">🔗<span>Paylaş</span></div>
    </div>

    <script>
        let bScore = 1250;
        let rScore = 1250;

        // Xal əlavə etmək (Google Sheets-ə bağlanan hissə bura olacaq)
        function addScore(side, points) {
            if(side === 'blue') bScore += points;
            else rScore += points;
            
            updateBar();
            
            // Google Sheets simulyasiyası
            console.log("Google Sheets-ə yazılır: " + side + " + " + points);
        }

        function updateBar() {
            let total = bScore + rScore;
            let bPercent = (bScore / total) * 100;
            let rPercent = (rScore / total) * 100;

            document.getElementById('blue-bar').style.width = bPercent + "%";
            document.getElementById('red-bar').style.width = rPercent + "%";
            
            document.getElementById('blue-score').innerText = bScore;
            document.getElementById('red-score').innerText = rScore;
        }

        function sendHeart(e) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
            heart.style.setProperty('--r', (Math.random() * 50 - 25) + 'deg');
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
            
            // Hər klikdə 1 xal artır
            if(e.clientX < window.innerWidth / 2) addScore('blue', 1);
            else addScore('red', 1);
        }

        // Google Sheets App Script URL-ni bura qoyacaqsan
        const G_SHEET_URL = "SENIN_URL_BURAYA";

        async function syncWithSheet() {

            // Amma hələlik boş saxlayırıq ki, kod xəta verməsin.
        }
    </script>
</body>
</html>
