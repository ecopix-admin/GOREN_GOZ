<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GÖREN GÖZ - AR FIX</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <button id="startBtn" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:9999; padding:20px; background:#00ff00; color:black; border:none; border-radius:10px; font-weight:bold; font-size:20px;">
        KAMERANI VƏ VİDEONU AÇ
    </button>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720; debugUIEnabled: false;">
        
        <a-assets>
            <video id="my-video" src="iz.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera gps-camera="simulateLatitude: 0; simulateLongitude: 0; minDistance: 1;" rotation-reader></a-camera>

        <a-entity 
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="10 10 10" 
            look-at="[gps-camera]">
            
            <a-video src="#my-video" width="4" height="2.25" material="shader: flat; side: double;"></a-video>

            <a-entity position="0 -1.5 0">
                <a-plane color="#000" width="4" height="0.5" opacity="0.6"></a-plane>
                <a-text value="ILK REQEMSAL IZ\nZIG-BAKI" align="center" color="#fff" width="4"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        window.onload = () => {
            const btn = document.getElementById('startBtn');
            btn.addEventListener('click', () => {
                const video = document.getElementById('my-video');
                video.play();
                btn.style.display = 'none';
            });
        };
    </script>
</body>
</html>
