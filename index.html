<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamerStream Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scroll-behavior: smooth; }
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; color: white; }
        
        /* Video Arxa Fonu */
        .placeholder-video { width: 100%; height: 100%; object-fit: cover; background: linear-gradient(180deg, #1a1a1a, #000); }
        
        /* İnterfeys Elementləri */
        .overlay { position: absolute; bottom: 80px; left: 15px; z-index: 10; }
        .username { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .description { font-size: 14px; opacity: 0.9; }

        .sidebar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: rgba(0,0,0,0.5); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Alt Menyu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; }
        .nav-item { color: #fff; font-size: 12px; text-align: center; opacity: 0.6; }
        .nav-item.active { opacity: 1; border-bottom: 2px solid #fe2c55; }
    </style>
</head>
<body>

<div class="video-container" id="feed">
    <div class="video-card">
        <div class="placeholder-video"></div> <div class="overlay">
            <div class="username">@shakhmal_gamer</div>
            <div class="description">PUBG Mobile - Turnir finalı! 🎮</div>
        </div>
        <div class="sidebar">
            <div class="action-btn" onclick="like()">❤️</div>
            <div class="action-btn">💬</div>
            <div class="action-btn">🎁</div>
        </div>
    </div>

    <div class="video-card">
        <div class="placeholder-video" style="background: linear-gradient(180deg, #2c3e50, #000);"></div>
        <div class="overlay">
            <div class="username">@elvin_live</div>
            <div class="description">Gəlin söhbət edək ☕ #JustChatting</div>
        </div>
        <div class="sidebar">
            <div class="action-btn">❤️</div>
            <div class="action-btn">💬</div>
            <div class="action-btn">🎁</div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active">Əsas</div>
    <div class="nav-item">Kəşf et</div>
    <div class="nav-item" style="font-size: 30px;">+</div>
    <div class="nav-item">Gələnlər</div>
    <div class="nav-item">Profil</div>
</div>

<script>
    // Telegram Mini App Initialization
    const tg = window.Telegram.WebApp;
    tg.expand(); // Tətbiqi tam ekran edir
    tg.headerColor = '#000000';

    function like() {
        tg.HapticFeedback.impactOccurred('medium'); // Telefonda vibrasiya yaradır
        alert("Bəyənildi!");
    }
</script>

</body>
</html>
