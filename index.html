<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>AR İnqilab - Küçə İzi</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        .ar-button {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff0050; color: white;
            border: none; border-radius: 50px; font-family: sans-serif;
            font-weight: bold; z-index: 999; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <button class="ar-button" onclick="playVideo()">KƏŞF ET / PLAY</button>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="my-video" src="iz.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera gps-camera rotation-reader></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;" scale="15 15 15" look-at="[gps-camera]">
            
            <a-video src="#my-video" width="4" height="2.25" position="0 0 0" material="transparent: true; opacity: 0.9;"></a-video>

            <a-plane color="#000" width="4.2" height="2.45" position="0 0 -0.01" opacity="0.5"></a-plane>

            <a-entity position="0 -1.5 0">
                <a-plane color="#ff0050" width="4" height="0.6" opacity="0.8"></a-plane>
                <a-text value="BU MƏNİM İLK RƏQƏMSAL İZİMDİR.\nBura istədiyiniz məqaləni yaza bilərsiniz." 
                        align="center" color="#fff" width="3.8" wrap-count="30"></a-text>
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        function playVideo() {
            var v = document.querySelector('#my-video');
            v.play();
            document.querySelector('.ar-button').style.display = 'none';
        }
    </script>
</body>
</html>
