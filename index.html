<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Real GPS Platform</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #ui-panel {
            position: fixed; bottom: 20px; left: 5%; width: 90%; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 20px; border-radius: 25px;
            border: 2px solid #00f2ea; display: none;
        }
        
        #start-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00f2ea;
        }

        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px;
        }
        
        #post-btn { background: #ff0050; color: white; font-weight: bold; }
        #start-btn { background: #00f2ea; color: black; font-weight: bold; padding: 20px 50px; border-radius: 50px; }
        .info { color: #fff; font-size: 12px; text-align: center; }
    </style>
</head>

<body>

    <div id="start-screen">
        <h1>GÖRƏN GÖZ</h1>
        <p>Real GPS Rejimi Aktiv Edilsin?</p>
        <button id="start-btn">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-panel">
        <div class="info" id="gps-status">GPS axtarılır...</div>
        <select id="type">
            <option value="text">3D Mətn</option>
            <option value="link">Sosial Link</option>
            <option value="img">Şəkil URL</option>
        </select>
        <input type="text" id="val" placeholder="Bura yazın...">
        <button id="post-btn">HAVAYA HƏKK ET</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        cursor="rayOrigin: mouse">
        
        <a-camera gps-camera="minDistance: 5; maxDistance: 100;" rotation-reader fov="80">
            <a-cursor color="#00f2ea"></a-cursor>
        </a-camera>

        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        let curLat, curLon;
        const world = document.getElementById('world');

        // Sistemi başladan və GPS-i işə salan funksiya
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-panel').style.display = 'block';

            // Real GPS izləmə
            navigator.geolocation.watchPosition(pos => {
                curLat = pos.coords.latitude;
                curLon = pos.coords.longitude;
                document.getElementById('gps-status').innerText = `GPS Aktiv: ${curLat.toFixed(4)}, ${curLon.toFixed(4)}`;
            }, err => {
                alert("GPS xətası! Ayarlardan məkana icazə ver.");
            }, { enableHighAccuracy: true });
        });

        document.getElementById('post-btn').addEventListener('click', () => {
            const type = document.getElementById('type').value;
            const content = document.getElementById('val').value;
            
            if(!content || !curLat) return alert("Məkan və ya məlumat yoxdur!");

            // 3D Obyekt yaratma
            const obj = document.createElement('a-entity');
            obj.setAttribute('gps-entity-place', `latitude: ${curLat}; longitude: ${curLon}`);
            obj.setAttribute('look-at', '[gps-camera]');
            obj.setAttribute('position', '0 1.6 0'); // Göz səviyyəsi

            if(type === 'text' || type === 'link') {
                const box = document.createElement('a-box');
                box.setAttribute('width', '2'); box.setAttribute('height', '0.6'); box.setAttribute('depth', '0.1');
                box.setAttribute('color', type === 'link' ? '#00f2ea' : '#ff0050');
                
                const txt = document.createElement('a-text');
                txt.setAttribute('value', content);
                txt.setAttribute('align', 'center');
                txt.setAttribute('position', '0 0 0.06');
                
                box.appendChild(txt);
                obj.appendChild(box);
                
                if(type === 'link') {
                    box.addEventListener('click', () => window.open(content, '_blank'));
                }
            } else {
                const img = document.createElement('a-image');
                img.setAttribute('src', content);
                img.setAttribute('width', '2.5'); img.setAttribute('height', '1.5');
                obj.appendChild(img);
            }

            world.appendChild(obj);
            alert("Obyekt bu koordinata həkk olundu!");
        });
    </script>
</body>
</html>
