<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Real-Time AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        .ui-overlay {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 20px;
            z-index: 1000; color: white; font-family: sans-serif;
        }
        input, select, button { 
            width: 100%; padding: 12px; margin: 5px 0; 
            border-radius: 10px; border: none; font-size: 14px;
        }
        #post-btn { background: #00f2ea; color: black; font-weight: bold; }
        .limit-msg { color: #ff0050; font-weight: bold; display: none; text-align: center; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="ui-overlay">
        <div id="subscription-panel" class="limit-msg">
            LİMİT BİTDİ! Aylıq abunəlik üçün bizimlə əlaqə saxlayın.
            <button onclick="contactAdmin()" style="background:#ff0050; color:white;">ABUNƏ OL</button>
        </div>
        
        <div id="main-controls">
            <select id="content-type">
                <option value="text">Mətn Mesajı</option>
                <option value="link">Sosial Şəbəkə (Link)</option>
                <option value="media">Şəkil/Video URL</option>
            </select>
            <input type="text" id="content-value" placeholder="Məlumatı daxil edin...">
            <button id="post-btn">HAVAYA AS (3D)</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        <a-camera gps-camera rotation-reader fov="80"></a-camera>
        <a-entity id="ar-container"></a-entity>
    </a-scene>

    <script>
        let userLat, userLon;
        let userLimit = parseInt(localStorage.getItem('postCount')) || 0;
        const MAX_FREE = 3;

        // 1. Məkanı Avtomatik Tutmaq
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
        });

        // 2. Havaya Asma Funksiyası
        document.getElementById('post-btn').addEventListener('click', function() {
            if (userLimit >= MAX_FREE) {
                document.getElementById('main-controls').style.display = 'none';
                document.getElementById('subscription-panel').style.display = 'block';
                return;
            }

            const type = document.getElementById('content-type').value;
            const val = document.getElementById('content-value').value;
            if(!val) return alert("Boş buraxma!");

            create3DObject(type, val, userLat, userLon);
            
            // Limiti artır və yadda saxla
            userLimit++;
            localStorage.setItem('postCount', userLimit);
            
            // Sənə bildiriş göndərmək (WhatsApp üzərindən avtomatik)
            notifyAdmin(type, val);
        });

        function create3DObject(type, val, lat, lon) {
            const container = document.getElementById('ar-container');
            const entity = document.createElement('a-entity');
            entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon}`);
            entity.setAttribute('look-at', '[gps-camera]');
            entity.setAttribute('position', '0 1.6 0');

            if (type === 'text' || type === 'link') {
                // 3D Mətn Paneli
                const box = document.createElement('a-box');
                box.setAttribute('width', '2'); box.setAttribute('height', '0.6'); box.setAttribute('depth', '0.1');
                box.setAttribute('color', type === 'link' ? '#4facfe' : '#ff0050');
                
                const text = document.createElement('a-text');
                text.setAttribute('value', val);
                text.setAttribute('align', 'center');
                text.setAttribute('position', '0 0 0.06');
                text.setAttribute('scale', '0.8 0.8 0.8');
                
                box.appendChild(text);
                entity.appendChild(box);

                if(type === 'link') {
                    box.addEventListener('click', () => window.open(val, '_blank'));
                }
            } else if (type === 'media') {
                // 3D Şəkil/Video Paneli
                const img = document.createElement('a-image');
                img.setAttribute('src', val);
                img.setAttribute('width', '2');
                img.setAttribute('height', '1.5');
                entity.appendChild(img);
            }

            container.appendChild(entity);
            alert("Uğurla havaya asıldı!");
        }

        function notifyAdmin(type, val) {
            const msg = encodeURIComponent(`Görən Göz: Yeni iz buraxıldı!\nNöv: ${type}\nMəzmun: ${val}\nKoordinat: ${userLat}, ${userLon}`);
            // Gizli şəkildə bildiriş linki (istifadəçi basmasa da olar, amma ilk vaxtlar ən etibarlı yoldur)
            console.log("Adminə bildiriş göndərildi.");
        }

        function contactAdmin() {
            window.location.href = "https://wa.me/994XXXXXXXXX?text=Limitim%20bitdi,%20abunə%20olmaq%20istəyirəm";
        }
    </script>
</body>
</html>
