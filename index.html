<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | FINAL PRECISION</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; align-items: center; 
            justify-content: center; z-index: 9999; text-align: center;
        }
        .btn { padding: 15px 40px; border-radius: 30px; background: #00f2fe; border: none; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>

<body>

    <div id="overlay">
        <div>
            <h1>GÖRƏN GÖZ</h1>
            <button class="btn" onclick="init()">SKAN ET</button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-logo" src="https://img.icons8.com/color/512/tiktok.png">
            <video id="vid" src="https://www.w3schools.com/html/mov_bbb.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-camera gps-camera="minDistance: 1; positionMinAccuracy: 100;" rotation-reader fov="60"></a-camera>

        <a-entity gps-entity-place="latitude: 40.437298; longitude: 49.865704;">
            
            <a-entity position="0 1.5 0" scale="4 4 4">
                
                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                    <a-image src="#tk-logo" width="1" height="1" 
                             class="clickable" 
                             onclick="handleLink(event)"></a-image>
                </a-entity>

                <a-video src="#vid" width="1.8" height="1" position="0 1.2 0" material="shader: flat;"></a-video>
                <a-text value="SAMXAL PRO" align="center" position="0 -0.8 0" width="3"></a-text>

            </a-entity>

            <a-ring color="#00f2fe" radius-inner="0.5" radius-outer="0.7" rotation="-90 0 0" position="0 -1.5 0"></a-ring>

        </a-entity>

    </a-scene>

    <script>
        function init() {
            document.getElementById('overlay').style.display = 'none';
            var v = document.querySelector('#vid');
            if(v) v.play();
        }

        function handleLink(e) {
            // ÖZBAŞINA YÖNLƏNDİRMƏNİ BLOKLAYAN ƏSAS HİSSƏ
            e.preventDefault();
            e.stopPropagation();
            window.location.href = "https://www.tiktok.com";
        }

        // GPS dəqiqliyi nastroykası
        navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    </script>
</body>
</html>
