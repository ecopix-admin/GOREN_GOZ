<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive AI | Smart Boutique</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon-blue: #00f2ff; --bg-glass: rgba(0, 0, 0, 0.85); }
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }

        /* Kamera Fonu */
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        .overlay { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; }
        .overlay * { pointer-events: auto; }

        /* Skaner Çərçivəsi */
        .scan-box { align-self: center; width: 250px; height: 250px; border: 2px solid var(--neon-blue); border-radius: 20px; position: relative; box-shadow: 0 0 20px var(--neon-blue); margin-top: 50px; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon-blue); animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Məhsul Kartı (Müştəri geyimi görsün) */
        #productCard { background: var(--bg-glass); border-radius: 30px; padding: 20px; border: 1px solid var(--neon-blue); display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .image-slider { position: relative; width: 100%; height: 200px; border-radius: 20px; overflow: hidden; margin-bottom: 15px; background: #fff; }
        #garmentImg { width: 100%; height: 100%; object-fit: contain; transition: 0.3s; }

        .color-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

        .action-btn { width: 100%; padding: 15px; background: var(--neon-blue); color: #000; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="overlay">
        <div class="scan-box" id="scanBox">
            <div class="scan-line"></div>
            <p style="position:absolute; bottom:-40px; width:100%; text-align:center; color:var(--neon-blue); font-size:12px;">BARKODU SKAN EDİN</p>
        </div>

        <div id="productCard">
            <h2 id="pName">İtalyan Pencəyi</h2>
            <p style="opacity:0.7; font-size:14px;">Qiymət: <span id="pPrice">120 AZN</span></p>
            
            <div class="image-slider">
                <img id="garmentImg" src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400" alt="Geyim">
            </div>

            <p style="text-align:center; font-size:12px; margin-bottom:10px;">Rəngi seçin:</p>
            <div class="color-dots">
                <div class="dot" style="background: #333;" onclick="changeColor('black')"></div>
                <div class="dot" style="background: #000080;" onclick="changeColor('navy')"></div>
                <div class="dot" style="background: #8B0000;" onclick="changeColor('darkred')"></div>
            </div>

            <button class="action-btn" onclick="askAI()">ASİSTENTİ DİNLƏ</button>
        </div>
    </div>

    <script>
        const pName = document.getElementById('pName');
        const pPrice = document.getElementById('pPrice');
        const pImg = document.getElementById('garmentImg');
        const card = document.getElementById('productCard');
        const scanBox = document.getElementById('scanBox');

        // 1. Skaner Funksiyası
        function onScanSuccess(decodedText, decodedResult) {
            // Barkod oxunduqda işə düşür
            scanBox.style.display = 'none';
            card.style.display = 'block';
            
            // Simulyasiya: Barkod nömrəsinə görə məhsul gətiririk
            pName.innerText = "Premium Yun Pencək";
            pPrice.innerText = "185 AZN";
            speak("Məhsul tapıldı. Bu bizim yeni kolleksiyamızdan olan premium yun pencəkdir. Nağd alışda sizə on beş faiz endirim edə bilərik.");
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // 2. Rəng Dəyişmə Funksiyası
        function changeColor(color) {
            pImg.style.filter = `hue-rotate(${color === 'black' ? '0' : (color === 'navy' ? '220' : '350')}deg) brightness(${color === 'black' ? '0.5' : '1'})`;
            speak("Bu rəng hal hazırda anbarda mövcuddur.");
        }

        // 3. Təmiz Azərbaycan Səsi
        function speak(text) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Azərbaycan dilini məcburi təyin edirik
            utterance.lang = 'az-AZ';
            utterance.rate = 0.9; // Daha təbii danışması üçün yavaşladırıq
            utterance.pitch = 1;

            window.speechSynthesis.speak(utterance);
        }

        function askAI() {
            speak("Bu geyim tamamilə təbii materialdan hazırlanıb və iki il zəmanət verilir. Razmerlərimiz mövcuddur.");
        }
    </script>
</body>
</html>
