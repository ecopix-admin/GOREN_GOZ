<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sham-Cell Pro</title>
    <style>
        :root { --ws-green: #00a884; --ws-dark: #0b141a; --ws-gray: #202c33; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--ws-dark); color: white; margin: 0; text-align: center; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--ws-gray); padding: 20px; border-bottom: 1px solid #333; }
        .id-badge { background: var(--ws-green); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        #display { flex: 1; padding: 20px; overflow-y: auto; font-family: monospace; color: #8696a0; }
        .controls { background: var(--ws-gray); padding: 20px; display: grid; gap: 10px; }
        input { padding: 15px; border-radius: 10px; border: none; background: #2a3942; color: white; font-size: 16px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-call { background: var(--ws-green); color: white; }
        .btn-hangup { background: #ea0038; color: white; }
        #call-ui { display: none; position: fixed; top: 0; left:0; width: 100%; height:100%; background: var(--ws-dark); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .ringing { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        SHAM-CELL <br>
        <small>ID: <span id="my-id" class="id-badge">Yüklənir...</span></small>
    </div>

    <div id="display">Sistem Hazır. Dinləmə aktivdir...</div>

    <div id="call-ui">
        <h1 id="call-status">ZƏNG GƏLİR...</h1>
        <div id="caller-info" style="font-size: 24px; margin-bottom: 30px;">ID: ????</div>
        <button class="btn btn-call" id="ans-btn" onclick="answerCall()">CAVAB VER</button>
        <button class="btn btn-hangup" onclick="hangUp()">SONLANDIR</button>
    </div>

    <div class="controls">
        <input type="number" id="target-id" placeholder="Qarşı tərəfin ID-si">
        <button class="btn btn-call" onclick="initiateCall()">ZƏNG ET</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const MY_ID = Math.floor(1000 + Math.random() * 9000);
    document.getElementById('my-id').innerText = MY_ID;

    // Tezlik Protokolu (İnsan qulağı üçün demək olar ki, eşidilməz)
    const FREQS = {
        CALL_INIT: 18000,
        CALL_ACK: 18500, // Qudok (Təsdiq)
        DATA_0: 19000,
        DATA_1: 19500
    };

    let analyzer, dataArray;

    // --- SİGNAL ÖTÜRÜCÜ ---
    function sendTone(freq, ms) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + (ms/1000));
    }

    // --- ZƏNG PROSESİ ---
    function initiateCall() {
        const tid = document.getElementById('target-id').value;
        if(!tid) return;
        
        log(`ID ${tid} üçün zəng siqnalı göndərilir...`);
        // Protokol: CALL_INIT + 4 rəqəmli ID
        sendTone(FREQS.CALL_INIT, 500);
        
        // Qudok simulyasiyası (Həqiqi qudok qarşıdan CALL_ACK gələndə çalacaq)
        document.getElementById('call-status').innerText = "ZƏNG EDİLİR...";
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('ans-btn').style.display = 'none';
    }

    function log(msg) {
        const d = document.getElementById('display');
        d.innerHTML += `<div>> ${msg}</div>`;
        d.scrollTop = d.scrollHeight;
    }

    // --- ALICI (DİNLƏMƏ) ---
    async function startListener() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 2048;
        source.connect(analyzer);
        dataArray = new Uint8Array(analyzer.frequencyBinCount);
        
        detectSignal();
    }

    function detectSignal() {
        analyzer.getByteFrequencyData(dataArray);
        
        const getVal = (freq) => dataArray[Math.round(freq / (audioCtx.sampleRate / analyzer.fftSize))];

        // Zəng siqnalını tut
        if (getVal(FREQS.CALL_INIT) > 150) {
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('call-status').innerText = "ZƏNG GƏLİR!";
            document.getElementById('ans-btn').style.display = 'block';
            // Avtomatik cavab siqnalı göndər (Qarşı tərəfdə qudok səsi üçün)
            sendTone(FREQS.CALL_ACK, 200);
        }

        // Qudok (ACK) siqnalını tut
        if (getVal(FREQS.CALL_ACK) > 150) {
            log("Zəng qarşıya çatdı (Qudok)...");
        }

        requestAnimationFrame(detectSignal);
    }

    function answerCall() {
        log("Bağlantı quruldu. Səsli rabitə aktivdir.");
        document.getElementById('call-status').innerText = "DANIŞIQ...";
    }

    function hangUp() {
        document.getElementById('call-screen').style.display = 'none';
        location.reload(); // Sistemi reset etmək üçün
    }

    // Proqramı başlat
    window.onload = () => {
        startListener();
    };
</script>
</body>
</html>
