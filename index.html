<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | AR PLATFORM</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Giriş Paneli */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            transition: 0.5s; text-align: center; color: white;
        }

        /* Parlaq Kamera Düyməsi */
        .scan-btn {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: 8px solid rgba(255,255,255,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
            animation: pulse 2s infinite; outline: none;
        }
        .scan-btn svg { fill: white; width: 45px; height: 45px; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(79, 172, 254, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
        }

        .title { margin-top: 20px; font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        .info { margin-top: 10px; color: #888; font-size: 14px; padding: 0 30px; line-height: 1.5; }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="scan-btn" onclick="startAR()">
            <svg viewBox="0 0 24 24">
                <path d="M9 3L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2h-3.17L15 3H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
        </div>
        <div class="title">GÖRƏN GÖZ</div>
        <div class="info">Kameranı açın və ətrafdakı rəqəmsal dünyanı kəşf edin.</div>
        <p style="margin-top: 30px; font-size: 12px; opacity: 0.5;">v1.0 Pro Mobile Experience</p>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-logo" src="https://img.icons8.com/color/512/tiktok.png">
            <video id="reklam-video" src="https://www.w3schools.com/html/mov_bbb.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <a-camera gps-camera="minDistance: 5; positionMinAccuracy: 1;" rotation-reader fov="80"></a-camera>

        <a-entity gps-entity-place="latitude: 40.437298; longitude: 49.865704;">
            
            <a-cylinder position="0 0 0" radius="0.05" height="20" color="#4facfe" opacity="0.3"></a-cylinder>

            <a-entity position="0 2 0" scale="6 6 6">
                
                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                    <a-image src="#tk-logo" width="1.2" height="1.2" class="clickable" onclick="openProfile()"></a-image>
                </a-entity>

                <a-video src="#reklam-video" width="2" height="1.1" position="0 1.3 0.2" 
                         material="shader: flat; side: double;"></a-video>
                
                <a-plane position="0 -1.2 0.1" width="3" height="0.6" color="#000" opacity="0.9">
                    <a-text value="SAMXAL VIDEO" align="center" width="5" color="#fff" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
                </a-plane>

            </a-entity>

            <a-ring color="#fff" radius-inner="0.9" radius-outer="1" rotation="-90 0 0" position="0 -1.5 0" opacity="0.5"></a-ring>

        </a-entity>

    </a-scene>

    <script>
        function startAR() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                // Videonu işə salırıq
                var v = document.querySelector('#reklam-video');
                v.play();
            }, 500);
        }

        function openProfile() {
            // Yalnız loqoya basanda açılacaq link
            window.location.href = "https://www.tiktok.com/@tiktok";
        }

        // GPS Dəqiqliyi üçün nastroyka
        navigator.geolocation.getCurrentPosition(null, null, {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        });
    </script>
</body>
</html>
