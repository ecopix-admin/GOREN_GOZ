<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Görən Göz - Professional AR V3.2</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: absolute; top: 0; left: 0; }

        /* Üst Panel - GPS və Başlıq */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.85); display: flex; align-items: center;
            justify-content: space-between; padding: 0 15px; z-index: 5000;
            border-bottom: 2px solid #00f2ea; box-sizing: border-box;
        }

        #gps-status { font-size: 13px; color: #00f2ea; font-family: monospace; font-weight: bold; }

        /* Bildiriş Paneli */
        #social-alert {
            position: fixed; top: 75px; left: 50%; transform: translateX(-50%);
            background: #00f2ea; color: #000; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; z-index: 6000; display: none;
            box-shadow: 0 0 20px rgba(0,242,234,0.6); text-align: center; white-space: nowrap;
        }

        /* Ürək Uçuşma Animasiyası */
        #heart-effect {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 200px; color: rgba(255, 0, 80, 0.9); display: none;
            z-index: 4500; pointer-events: none; animation: heartBurst 1.2s ease-in-out forwards;
        }

        @keyframes heartBurst {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
        }

        /* ALT PANEL - Mərkəzləşdirilmiş Düymələr */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }

        .input-wrapper {
            width: 92%; max-width: 450px; background: rgba(15, 15, 15, 0.95);
            border-radius: 50px; display: flex; align-items: center;
            padding: 8px 15px; border: 2px solid #333;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }

        #msg-input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px; outline: none; font-size: 16px;
        }

        .btn-action {
            color: #00f2ea; font-size: 24px; margin: 0 12px; cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-action:active { transform: scale(0.85); }

        #send-btn { 
            background: #ff0050; color: white; width: 52px; height: 52px; 
            border-radius: 50%; border: none; display: flex; 
            align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.5);
        }

        /* Rəy Paneli (Açılan Menyü) */
        #comment-panel {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white;
            padding: 25px; border-radius: 30px; display: none; z-index: 5500;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        #comm-txt {
            width: 100%; padding: 15px; border-radius: 15px; 
            border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; outline: none;
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <div style="color: #00f2ea; font-weight: bold; letter-spacing: 1px;">GÖRƏN GÖZ v.3.2</div>
        <div id="gps-status"><i class="fas fa-satellite"></i> GPS Gözlənilir...</div>
    </div>

    <div id="social-alert"></div>
    <div id="heart-effect"><i class="fas fa-heart"></i></div>

    <div id="comment-panel">
        <h3 style="margin-top:0; color:#333;">İzə Reaksiya Ver</h3>
        <input type="text" id="comm-txt" placeholder="Rəyinizi yazın...">
        <div style="display: flex; gap: 10px;">
            <button onclick="sendSocial('COMMENT')" style="flex: 2; background:#ff0050; color:white; border:none; padding:15px; border-radius:15px; font-weight: bold; font-size:16px;">Göndər</button>
            <button onclick="sendSocial('LIKE')" style="flex: 1; background:#00f2ea; border:none; padding:15px; border-radius:15px; font-size: 22px;"><i class="fas fa-heart"></i></button>
        </div>
        <button onclick="document.getElementById('comment-panel').style.display='none'" style="display:block; width:100%; margin-top:15px; background:none; border:none; color:#999; font-weight:bold;">Bağla</button>
    </div>

    <div class="bottom-nav">
        <div class="input-wrapper">
            <label for="file-upload"><i class="fas fa-music btn-action" title="MP3 Yüklə"></i></label>
            <input type="file" id="file-upload" accept="audio/mp3,audio/wav" style="display:none;">
            
            <input type="text" id="msg-input" placeholder="Məkana iz burax...">
            
            <i class="fas fa-microphone btn-action" id="voice-btn" title="Səs Yaz"></i>
            
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false" 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-camera gps-camera="minDistance: 0.1; maxDistance: 1000;" rotation-reader>
            <a-cursor color="#00f2ea" scale="2 2 2"></a-cursor>
        </a-camera>
        
        <a-entity id="main-world"></a-entity>
    </a-scene>

    <script>
        const TG_TOKEN = "8799012820:AAEPVV76TIkjw9L_Jh6DUqpNHGBdMLd770A";
        const TG_CHAT = "@vidosmarkarxiv";
        let lat, lon, acc, activeObjId = null;
        let mediaRecorder, audioChunks = [];

        // GPS İzləmə
        navigator.geolocation.watchPosition(p => {
            lat = p.coords.latitude;
            lon = p.coords.longitude;
            acc = p.coords.accuracy.toFixed(1);
            const statusEl = document.getElementById('gps-status');
            statusEl.innerHTML = `<i class="fas fa-location-crosshairs"></i> Xəta: ${acc}m`;
            statusEl.style.color = acc > 10 ? "#ff0050" : "#00f2ea";
        }, null, { enableHighAccuracy: true });

        async function tgLog(msg) {
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent(msg)}`);
        }

        function triggerNotif(text) {
            const el = document.getElementById('social-alert');
            el.innerText = text; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function placeAR(content, type = 'text') {
            if(!lat) return alert("GPS gözlənilir...");
            
            const id = Date.now();
            const entity = document.createElement('a-entity');
            entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon}`);
            entity.setAttribute('look-at', '[gps-camera]');
            entity.setAttribute('scale', '15 15 15'); 
            
            const box = document.createElement('a-box');
            box.setAttribute('width', '2.5'); box.setAttribute('height', '0.8');
            box.setAttribute('color', type === 'audio' ? '#00f2ea' : '#1a1a1a');
            box.setAttribute('material', 'opacity: 0.9; transparent: true');

            box.onclick = () => {
                activeObjId = id;
                document.getElementById('comment-panel').style.display = 'block';
            };

            const txt = document.createElement('a-text');
            txt.setAttribute('value', type === 'audio' ? "🎵 SƏSİ DİNLƏ" : content.substring(0,25));
            txt.setAttribute('align', 'center'); txt.setAttribute('position', '0 0 0.06');
            txt.setAttribute('width', '4');

            if(type === 'audio') {
                entity.setAttribute('sound', `src: url(${content}); on: click; volume: 8`);
            }

            box.appendChild(txt);
            entity.appendChild(box);
            document.getElementById('main-world').appendChild(entity);
            
            tgLog(`YENİ İZ (${type})|ID:${id}|Məkan:${lat},${lon}`);
            triggerNotif("İz havada bərkidildi! 📍");
        }

        // Səs Yazma
        document.getElementById('voice-btn').onclick = async function() {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    placeAR(URL.createObjectURL(blob), 'audio');
                };
                mediaRecorder.start();
                this.classList.add('fa-beat'); this.style.color = "#ff0050";
                triggerNotif("Səs yazılır...");
            } else {
                mediaRecorder.stop();
                this.classList.remove('fa-beat'); this.style.color = "#00f2ea";
            }
        };

        // MP3 Yükləmə
        document.getElementById('file-upload').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = (ev) => placeAR(ev.target.result, 'audio');
                r.readAsDataURL(f);
            }
        };

        // Sosyal Funksiyalar (Ürək və Şərh)
        function sendSocial(type) {
            if(type === 'LIKE') {
                const h = document.getElementById('heart-effect');
                h.style.display = 'block';
                setTimeout(() => h.style.display = 'none', 1200);
                triggerNotif("İz bəyənildi! ❤️");
                tgLog(`BƏYƏNİ|ID:${activeObjId}`);
            } else {
                const c = document.getElementById('comm-txt').value;
                if(!c) return;
                triggerNotif("Şərhiniz göndərildi!");
                tgLog(`ŞƏRH|ID:${activeObjId}|Mətn:${c}`);
                document.getElementById('comm-txt').value = "";
            }
            document.getElementById('comment-panel').style.display = 'none';
        }

        document.getElementById('send-btn').onclick = () => {
            const v = document.getElementById('msg-input').value;
            if(v) placeAR(v, 'text');
            document.getElementById('msg-input').value = "";
        };
    </script>
</body>
</html>
