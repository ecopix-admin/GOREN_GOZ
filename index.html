<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | DIGITAL IDENTITY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; transition: 0.5s;
        }
        .start-btn {
            padding: 20px 40px; border-radius: 50px; background: #00f2fe;
            border: none; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 20px #00f2fe; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>

<body>

    <div id="overlay-ui">
        <h1 style="letter-spacing: 5px;">GÖRƏN GÖZ</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Rəqəmsal dünyanı kəşf et</p>
        <button class="start-btn" onclick="this.parentElement.style.display='none'">RADARI AC</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;">

        <a-assets>
            <img id="platform-icon" src="https://img.icons8.com/color/512/tiktok.png">
            <img id="user-avatar" src="https://i.pravatar.cc/300"> 
        </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader fov="80"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 1.5 0" scale="6 6 6" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                
                <a-image src="#platform-icon" width="1.2" height="1.2" opacity="0.9"></a-image>
                
                <a-circle src="#user-avatar" radius="0.25" position="0 0 0.05" 
                          material="shader: flat; side: double;"></a-circle>
                
                <a-text value="SAMXAL" align="center" position="0 -0.8 0.1" 
                        width="3" color="#00f2fe" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
            </a-entity>

            <a-ring color="#00f2fe" radius-inner="0.9" radius-outer="1" rotation="-90 0 0" position="0 -1 0" opacity="0.5"></a-ring>

        </a-entity>

    </a-scene>

</body>
</html>
