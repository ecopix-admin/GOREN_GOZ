<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>BioPulse: Real-Time Heart Visualization</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 1px solid #333; width: 90vw; height: 50vh; background: #050505; }
        .ui { margin-top: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #0f0; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>
    <div class="ui">
        <h3 id="status">Sensoru işə salmaq üçün toxun</h3>
        <button id="startBtn">Qeydiyyatı Başla</button>
    </div>

<script>
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    let chunks = [];
    let mediaRecorder;

    // Sensor datası
    let history = new Array(200).fill(0);

    // 1. Giroskopu işə sal
    async function initSensors() {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== 'granted') return alert("İcazə lazımdır!");
        }

        window.addEventListener('devicemotion', (event) => {
            const z = event.acceleration.z || 0;
            history.push(z);
            history.shift();
            draw();
        });
    }

    // 2. Vizualizasiya (Ürək ritminin dalğası)
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i < history.length; i++) {
            let x = (i / history.length) * canvas.width;
            let y = canvas.height / 2 + (history[i] * 50);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // 3. Videoya qeyd alma
    startBtn.onclick = () => {
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'urek_analizi.webm';
            a.click();
        };
        mediaRecorder.start();
        document.getElementById('status').innerText = "Qeyd olunur... Ürəyinizin üzərinə qoyun.";
        setTimeout(() => mediaRecorder.stop(), 10000); // 10 saniyə qeyd
    };

    window.onclick = initSensors;
</script>
</body>
</html>
