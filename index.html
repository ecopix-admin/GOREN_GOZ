<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - SMART AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        #media-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; justify-content: center; align-items: center;
            flex-direction: column; color: white; font-family: sans-serif; text-align: center;
        }
        #media-image { max-width: 90%; max-height: 60%; border: 2px solid #ff0050; border-radius: 10px; }
        #close-btn { position: absolute; top: 30px; right: 30px; font-size: 30px; cursor: pointer; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="media-overlay">
        <span id="close-btn" onclick="document.getElementById('media-overlay').style.display='none'">× Bağla</span>
        <img id="media-image" src="poster.jpg">
        <div style="padding: 20px;">
            <h2>Rəqəmsal İz Tapıldı</h2>
            <p>Bu məzmun avtomatik olaraq ekranınıza yükləndi.</p>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="my-poster" src="poster.jpg" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera="minDistance: 2;" rotation-reader fov="90"></a-camera>

        <a-entity 
            id="ar-element"
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="10 10 10" 
            look-at="[gps-camera]">
            
            <a-image src="#my-poster" width="4" height="3" material="shader: flat;"></a-image>

            <a-entity position="0 -1.8 0">
                <a-plane color="#ff0050" width="4" height="0.6" opacity="0.9"></a-plane>
                <a-text value="MEQALE BURADADIR" align="center" color="#fff" width="4"></a-text>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const arEntity = document.querySelector('#ar-element');
        const overlay = document.getElementById('media-overlay');

        setInterval(() => {
            const distance = arEntity.getAttribute('distance');
            // Əgər məsafə 15 metrdən azdırsa, tam ekranı aç
            if (distance && distance < 15 && overlay.style.display !== 'flex') {
                overlay.style.display = 'flex';
            }
        }, 1000);
    </script>
</body>
</html>
