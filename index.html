<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drive AI | Professional AR Assistant</title>
    
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=YOUR_FREE_KEY"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon-blue: #00f2ff; --bg-glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; height: 100vh; }

        #mainCam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.6); }
        .ui-layer { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 15px; }

        /* Avatarr Paneli */
        .avatarr-container { 
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 100; display: none; text-align: center; 
        }
        #avatarr-img { width: 200px; filter: drop-shadow(0 0 20px var(--neon-blue)); }

        /* Məhsul Paneli */
        .product-panel { margin-top: auto; background: var(--bg-glass); border-radius: 25px; padding: 25px; border-top: 3px solid var(--neon-blue); }
        .p-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .p-price { font-size: 18px; color: #ffcc00; margin-bottom: 15px; }
        .ask-btn { width: 100%; padding: 18px; background: var(--neon-blue); color: #000; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Yüklənir effekti */
        .pulse-ring { position: absolute; width: 220px; height: 220px; border: 2px solid var(--neon-blue); border-radius: 50%; animation: pulse 2s infinite; display: none; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    </style>
</head>
<body>

    <video id="mainCam" autoplay playsinline muted></video>

    <div class="avatarr-container" id="avatarrBox">
        <div class="pulse-ring" id="ring"></div>
        <img id="avatarr-img" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZpdHppbzR2OXBhajdyZXM3bnlsNjdjMzk2ZWJvZnN6ejE2cXdzZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3ornk57KwDXfghfv4Q/giphy.gif">
        <div style="margin-top:10px; color:var(--neon-blue); font-weight:bold; letter-spacing:2px;">AI ASSISTANT</div>
    </div>

    <div class="ui-layer">
        <div class="product-panel">
            <div class="p-title">Samsung Galaxy S24 Ultra</div>
            <div class="p-price">2499 AZN</div>
            <p style="font-size:13px; opacity:0.7; margin-bottom:20px;">AI Kamera, 200MP sensor və üstün performans.</p>
            <button class="ask-btn" onclick="assistantTalk()">
                <i class="fas fa-comment-dots"></i> VİRTUAL SATICIYA SORUŞ
            </button>
        </div>
    </div>

    <script>
        // Kameranı başlat
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('mainCam').srcObject = stream;
        }

        function assistantTalk() {
            const box = document.getElementById('avatarrBox');
            const ring = document.getElementById('ring');
            const btn = document.querySelector('.ask-btn');

            box.style.display = 'block';
            ring.style.display = 'block';
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> SATICI DANIŞIR...`;

            // Professional Azərbaycan Səsi (Google/ResponsiveVoice tərəfindən)
            responsiveVoice.speak(
                "Salam! Mən sizin virtual köməkçinizəm. Bu smartfon hazırda mağazamızda ən çox satılan modeldir. Səksən giqabayt daxili yaddaşı və süni intellektli kamerası var. Nağd alışda sizə özəl on faiz endirim edə bilərik. Başqa nəyi bilmək istərdiniz?", 
                "Turkish Male", // Azərbaycan dili üçün ən yaxın və təmiz səs budur (və ya "Turkish Female")
                {
                    pitch: 1, 
                    rate: 1, 
                    volume: 1,
                    onend: function() {
                        box.style.display = 'none';
                        ring.style.display = 'none';
                        btn.innerHTML = `<i class="fas fa-comment-dots"></i> YENİDƏN SORUŞ`;
                    }
                }
            );
        }

        window.onload = startCamera;
    </script>
</body>
</html>
