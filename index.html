<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görən Göz Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        /* Video Container */
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #111; }

        /* Canlı Yayım Etiketi (LIVE) */
        .live-badge { position: absolute; top: 20px; left: 15px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 20px; z-index: 20; }
        .live-dot { width: 8px; height: 8px; background: #ff0050; border-radius: 50%; box-shadow: 0 0 10px #ff0050; }
        .viewer-count { font-size: 13px; font-weight: bold; }

        /* Sağ Panel (Actions) */
        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 20; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; position: relative; margin-bottom: 10px; }
        .plus-icon { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: #ff0050; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2px solid white; }
        .action-item { text-align: center; cursor: pointer; }
        .action-icon { font-size: 30px; margin-bottom: 2px; }
        .action-label { font-size: 11px; font-weight: 500; }

        /* Canlı Çat (Comments) */
        .chat-area { position: absolute; bottom: 80px; left: 15px; width: 70%; max-height: 200px; overflow-y: hidden; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .comment { background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 12px; font-size: 14px; animation: slideIn 0.3s ease; width: fit-content; }
        .comment b { color: #ffeb3b; margin-right: 5px; }

        /* Hədiyyə Animasiyası Mesajı */
        #gift-alert { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(90deg, #ff0050, #00f2ea); padding: 10px 20px; border-radius: 30px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 0 20px rgba(255,0,80,0.5); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="gift-alert">🎁 Shamxal Qızılgül göndərdi!</div>

<div class="video-container">
    <div class="video-card">
        <div class="live-badge">
            <div class="live-dot"></div>
            <div class="viewer-count">1.4K baxır</div>
        </div>

        <div class="sidebar">
            <div class="avatar">
                <img src="https://via.placeholder.com/50" style="border-radius:50%; width:100%">
                <div class="plus-icon">+</div>
            </div>
            <div class="action-item" onclick="showHeart()">
                <div class="action-icon">❤️</div>
                <div class="action-label">24.5K</div>
            </div>
            <div class="action-item" onclick="sendGift()">
                <div class="action-icon">🎁</div>
                <div class="action-label">Hədiyyə</div>
            </div>
            <div class="action-item">
                <div class="action-icon">🔗</div>
                <div class="action-label">Paylaş</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="comment"><b>Elvin:</b> Salam, yayım əladır! 🔥</div>
            <div class="comment"><b>Aysel:</b> PUBG turniri nə vaxtdır?</div>
            <div class="comment"><b>Gamer99:</b> Hədiyyə göndərdim, baxarsan</div>
        </div>
    </div>

    <div class="video-card" style="background: #0d0d0d;">
        </div>
</div>

<script>
    function sendGift() {
        const alert = document.getElementById('gift-alert');
        alert.style.display = 'block';
        setTimeout(() => { alert.style.display = 'none'; }, 2000);
    }

    function showHeart() {
        // TikTok-dakı kimi kiçik ürək animasiyası üçün bura kod əlavə ediləcək
        console.log("Ürək göndərildi!");
    }
</script>

</body>
</html>
