<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>AR İnqilab - Sabit Görüntü</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <button id="playBtn" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:999; padding:15px; border-radius:50px; background:#ff0050; color:white; border:none; font-weight:bold;">KƏŞF ET / PLAY</button>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoSettings: { facingMode: 'environment', aspectRatio: 1.7777777778 }">
        
        <a-assets>
            <video id="my-video" src="iz.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera gps-camera="minDistance: 5; maxDistance: 100;" rotation-reader></a-camera>

        <a-entity 
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="8 8 8" 
            look-at="[gps-camera]">
            
            <a-video src="#my-video" width="4" height="2.25" material="shader: flat; side: double; opacity: 1;"></a-video>

            <a-plane color="#000" width="4.1" height="2.35" position="0 0 -0.05" opacity="0.3"></a-plane>

            <a-entity position="0 -1.8 0">
                <a-plane color="#ff0050" width="4" height="0.7" opacity="0.9"></a-plane>
                <a-text value="ILK REQEMSAL IZ\n(Lacın Market yaxınlıgı)" align="center" color="#fff" width="4"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        document.getElementById('playBtn').addEventListener('click', function() {
            var v = document.querySelector('#my-video');
            v.play();
            this.style.display = 'none';
        });
    </script>
</body>
</html>
