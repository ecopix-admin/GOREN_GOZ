<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Virtual Satıcı | DEMO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Kamera Fon */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* UI Qatı */
        .app-ui { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 20px; }

        /* Üst Panel: Hoşgeldiniz */
        .welcome-panel { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; border: 2px solid #00f2ff; text-align: center; margin-top: 10px; }
        .welcome-title { font-size: 18px; font-weight: bold; color: #00f2ff; margin-bottom: 5px; }
        .welcome-text { font-size: 12px; color: #fff; opacity: 0.8; }

        /* Orta Hissə: Virtual Satıcı Düyməsi */
        .v-assistant-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .v-assistant-btn { width: 100px; height: 100px; background: rgba(0, 242, 255, 0.2); border: 4px solid #00f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; animation: pulse 2s infinite; }
        .v-assistant-btn i { font-size: 50px; color: #00f2ff; }
        .v-status { margin-top: 10px; font-size: 14px; color: #00f2ff; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Alt Panel: Məhsul Məlumatı (Məsələn) */
        .product-panel { background: rgba(0, 0, 0, 0.8); border-radius: 20px 20px 0 0; padding: 20px; border-top: 3px solid #00f2ff; margin: auto -20px 0 -20px; display: none; }
        .p-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .p-price { font-size: 18px; color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
        .p-desc { font-size: 14px; color: #fff; opacity: 0.8; line-height: 1.4; margin-bottom: 15px; }
        .p-actions { display: flex; gap: 10px; }
        .btn-call { flex: 1; padding: 12px; background: #00f2ff; color: #000; border: none; border-radius: 10px; font-weight: bold; }

        /* Animasiya */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>

    <div class="app-ui">
        <div class="welcome-panel">
            <div class="welcome-title">Hoş Gəldiniz!</div>
            <div class="welcome-text">Mağazamızın virtual köməkçisi ilə tanış olun.</div>
        </div>

        <div class="v-assistant-container">
            <div class="v-assistant-btn" onclick="activateAssistant()">
                <i class="fas fa-robot"></i>
            </div>
            <div class="v-status">Satıcı Oflayn</div>
        </div>

        <div class="product-panel" id="productPanel">
            <div class="p-title">Smartfon GALAXY S24</div>
            <div class="p-price">2499 AZN</div>
            <div class="p-desc">
                Ən yeni süni intellekt funksiyaları, 200MP kamera və 5000mAh batareya. Mağazamızda bu həftə xüsusi endirim var!
            </div>
            <div class="p-actions">
                <button class="btn-call" onclick="askAI('Qiymət')">Süni İntellektə Soruş</button>
            </div>
        </div>
    </div>

    <script>
        // Kamera Giriş
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                document.getElementById('video-bg').srcObject = stream;
            } catch (err) {
                console.error("Kamera xətası: ", err);
                alert("Kameraya icazə verilmədi!");
            }
        }

        // Virtual Satıcını Aktivləşdir
        function activateAssistant() {
            const status = document.querySelector('.v-status');
            const panel = document.getElementById('productPanel');

            if (panel.style.display === 'none' || panel.style.display === '') {
                // Aktivləşdir
                status.innerText = "Satıcı Aktiv";
                status.style.color = "#00f2ff";
                panel.style.display = 'block';
                speak("Salam! Mən sizin virtual köməkçinizəm. Mağazamızın ən yeni smartfonu ilə maraqlanırsınız?");
            } else {
                // Deaktivləşdir
                status.innerText = "Satıcı Oflayn";
                status.style.color = "#ffcc00";
                panel.style.display = 'none';
            }
        }

        function askAI(topic) {
            // Test üçün bəsit səsli cavab
            speak("Bu məhsulun rəsmi qiyməti 2499 AZN-dir, lakin bizdə nağd alışda 10 faiz endirim mövcuddur.");
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'az-AZ'; // Azərbaycan dili
            window.speechSynthesis.speak(msg);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
