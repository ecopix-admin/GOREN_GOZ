<!DOCTYPE html>
<html lang="az">
<head>

        .video-container {
            flex-grow: 1;

            width: 100%;

            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // İstifadəçi ekrana ilk dəfə toxunanda reklam açılması üçün (Direct Link hiyləsi)

            console.log("Reklam baxışı qeydə alındı!");
