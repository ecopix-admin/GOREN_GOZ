<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - GPS AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        /* Avtomatik açılan məqalə paneli */
        #media-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; 
            align-items: center; flex-direction: column; color: white; text-align: center;
        }
        #media-img { max-width: 85%; border-radius: 15px; border: 2px solid #ff0050; }
        .close-btn { margin-top: 20px; padding: 10px 25px; background: #ff0050; border: none; color: white; border-radius: 50px; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="media-overlay">
        <img id="media-img" src="poster.jpg">
        <div style="padding: 20px;">
            <h2 id="title">Rəqəmsal İz Tapıldı!</h2>
            <p id="desc">Sən artıq bu məqalənin koordinatındasan.</p>
        </div>
        <button class="close-btn" onclick="document.getElementById('media-overlay').style.display='none'">Bağla</button>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="my-asset" src="poster.jpg" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera="minDistance: 5; maxDistance: 100;" rotation-reader></a-camera>

        <a-entity 
            id="ar-point"
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="15 15 15" 
            look-at="[gps-camera]">
            
            <a-image src="#my-asset" width="4" height="3" material="shader: flat; transparent: true;"></a-image>

            <a-entity position="0 -1.5 0">
                <a-plane color="#ff0050" width="4" height="0.5" opacity="0.9"></a-plane>
                <a-text value="IZ BURADADIR" align="center" color="#fff" width="4"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const arPoint = document.querySelector('#ar-point');
        const overlay = document.getElementById('media-overlay');

        // Məsafəni davamlı yoxla
        setInterval(() => {
            const dist = arPoint.getAttribute('distance');
            
            // Əgər 20 metrdən az qalıbsa, məqaləni ekrana gətir
            if (dist && dist < 20 && overlay.style.display !== 'flex') {
                overlay.style.display = 'flex';
            }
        }, 1000);
    </script>
</body>
</html>
