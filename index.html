<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - STABIL AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <button id="unmuteBtn" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; padding:12px; background:rgba(0,0,0,0.7); color:white; border:1px solid white; border-radius:10px;">SƏSİ AÇ</button>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <video id="my-video" src="iz.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted autoplay></video>
        </a-assets>

        <a-camera gps-camera="minDistance: 3;" rotation-reader fov="80"></a-camera>

        <a-entity 
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="12 12 12" 
            look-at="[gps-camera]">
            
            <a-video src="#my-video" width="4" height="2.25" material="shader: flat; side: double;"></a-video>

            <a-entity position="0 -1.5 0">
                <a-plane color="#000" width="4" height="0.5" opacity="0.6"></a-plane>
                <a-text value="IZ BURADADIR" align="center" color="#fff" width="4"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        window.onclick = function() {
            var v = document.querySelector('#my-video');
            v.play(); // Ekrana toxunanda videonu məcburi başladırıq
        };

        document.getElementById('unmuteBtn').onclick = function() {
            var v = document.querySelector('#my-video');
            v.muted = false; // Səsi aktivləşdiririk
            this.style.display = 'none';
        };
    </script>
</body>
</html>
