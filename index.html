<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canlı Oyuncaq</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #cam { width: 100%; height: 100vh; object-fit: cover; position: fixed; }
        .ui { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 10; }
        #talkBtn { 
            background: #ff00ff; border: 5px solid white; border-radius: 50%; width: 90px; height: 90px; 
            box-shadow: 0 0 20px #ff00ff; cursor: pointer;
        }
        #status { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; margin: 0 20px 15px; font-size: 18px; min-height: 40px; }
        #mouth {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 40px; background: #ff0000; border-radius: 50%;
            display: none; border: 5px solid white; z-index: 20;
            box-shadow: 0 0 30px red;
            animation: talkAnim 0.3s infinite alternate;
        }
        @keyframes talkAnim { from { height: 15px; } to { height: 70px; } }
    </style>
</head>
<body>

    <video id="cam" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="mouth"></div>

    <div class="ui">
        <div id="status">Oyuncağı göstər və düyməyə bas!</div>
        <button id="talkBtn" onclick="awakenToy()"></button>
    </div>

    <script>
        const API_KEY = 'AIzaSyCbGLOBDKi6qj5KzKuLe5G1-8cVEY092S4'; // API Key-in buradadır
        
        const video = document.getElementById('cam');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const mouth = document.getElementById('mouth');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);

        async function awakenToy() {
            status.innerText = "Düşünürəm... (AI Baxır)";
            
            try {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const imgData = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Sən bu şəkildəki obyekt və ya oyuncaqsan. Uşaqla Azərbaycan dilində cəmi 5-10 sözlə salamlaş." },
                            { inline_data: { mime_type: "image/jpeg", data: imgData } }
                        ]}]
                    })
                });

                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                
                status.innerText = text;
                speakText(text);

            } catch (e) {
                status.innerText = "Xəta! İnterneti yoxla.";
                console.log(e);
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'tr-TR'; // Azərbaycan dili yoxdursa Türk dili səsi ilə oxusun (çox bənzəyir)
            
            speech.onstart = () => { mouth.style.display = 'block'; };
            speech.onend = () => { 
                mouth.style.display = 'none'; 
                status.innerText = "Yenidən danışmaq üçün bas!";
            };

            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
