<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live Feed</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: white; }
        
        /* Reklam Sahəsi */
        .ad-container { position: absolute; top: 10px; left: 0; width: 100%; z-index: 100; text-align: center; height: 60px; pointer-events: none; }
        
        /* Yayım Konteyneri */
        #feed-container { width: 100%; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Sürüşdürmə İpucu */
        .swipe-hint { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); opacity: 0.6; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ad-container">
        <div id="ad-top"></div>
    </div>

    <div id="feed-container">
        <iframe id="live-player" src="https://www.tiktok.com/embed/v2/@SƏNİN_ADIN"></iframe>
    </div>

    <div class="swipe-hint">Növbəti canlı üçün yuxarı sürüşdür ↑</div>

    <script>
        // Canlı yayımların siyahısı (Bura istədiyin qədər populyar yayımçı əlavə edə bilərsən)
        const liveFeeds = [
            "https://www.tiktok.com/embed/v2/@istifadeci1",
            "https://www.tiktok.com/embed/v2/@istifadeci2",
            "https://www.tiktok.com/embed/v2/@SƏNİN_ADIN",
            "https://www.tiktok.com/embed/v2/@xeberler"
        ];
        
        let currentIndex = 0;
        let startY = 0;

        const player = document.getElementById('live-player');

        // Sürüşdürməni tutmaq
        document.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });

        document.addEventListener('touchend', e => {
            let endY = e.changedTouches[0].pageY;
            if (startY - endY > 100) { // Yuxarı sürüşdürmə (100px-dən çoxdursa)
                changeLive();
            }
        });

        function changeLive() {
            currentIndex = (currentIndex + 1) % liveFeeds.length;
            
            // Pleyeri gizlət və yenisini yüklə (effekt üçün)
            player.style.opacity = 0.5;
            player.src = liveFeeds[currentIndex];
            
            player.onload = () => {
                player.style.opacity = 1;
                // REKLAMI YENİLƏMƏK (Adsterra Direct Link-i hər keçiddə açmaq olar)
                console.log("Yeni yayım yükləndi, reklam baxışı sayıldı.");
            };
        }
    </script>
</body>
</html>
