<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | STRICT LOGIC v2</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; align-items: center; 
            justify-content: center; z-index: 9999; text-align: center;
        }
        /* Səliqəli Skan Düyməsi */
        .scan-btn { 
            padding: 20px 60px; border-radius: 40px; background: #00f2fe; 
            border: none; font-weight: bold; cursor: pointer; color: #000; 
            font-size: 20px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <div>
            <h1 style="margin-bottom: 40px;">GÖRƏN GÖZ</h1>
            <button class="scan-btn" onclick="activateAR()">SKAN ET</button>
            <p style="margin-top: 20px; color: #888; font-size: 12px;">Kamera yalnız koordinatda aktivləşəcək</p>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .target-logo">

        <a-assets>
            <img id="tk-icon" src="https://img.icons8.com/color/512/tiktok.png">
            <video id="ar-video" 
                   src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <a-camera gps-camera="minDistance: 1; positionMinAccuracy: 100;" rotation-reader fov="60"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 1.5 0" scale="5 5 5">
                
                <a-video src="#ar-video" width="2" height="1.1" position="0 1.3 0" 
                         material="shader: flat; side: double;"></a-video>

                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                    <a-image src="#tk-icon" width="0.8" height="0.8" 
                             class="target-logo" 
                             onclick="goLink(event)"></a-image>
                </a-entity>
                
                <a-text value="SAMXAL PRO" align="center" position="0 -0.8 0" width="3"></a-text>
            </a-entity>

            <a-ring color="#00f2fe" radius-inner="0.4" radius-outer="0.5" rotation="-90 0 0" position="0 -1.5 0"></a-ring>

        </a-entity>

    </a-scene>

    <script>
        function activateAR() {
            // Düyməyə basanda yalnız UI bağlanır
            document.getElementById('overlay').style.display = 'none';
            // Video işə düşür
            var v = document.querySelector('#ar-video');
            if(v) v.play();
            console.log("AR Skaner Aktivdir...");
        }

        function goLink(e) {
            // Səhvən klikləmənin qarşısını almaq üçün təhlükəsizlik baryeri
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            window.location.href = "https://www.tiktok.com";
        }

        // GPS dəqiqliyi
        navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    </script>
</body>
</html>
