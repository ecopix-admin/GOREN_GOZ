<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Intelligence</title>
    
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0a; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        
        #video { width: 100%; height: 50vh; object-fit: cover; border-bottom: 2px solid var(--accent); }
        .controls { padding: 20px; text-align: center; }
        
        .result-box { 
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; 
            height: 25vh; overflow-y: auto; margin: 10px; border: 1px solid #333;
            font-size: 14px; white-space: pre-wrap;
        }

        .btn {
            background: var(--accent); color: black; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 80%;
            margin: 10px 0; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }

        .export-btns { display: flex; justify-content: center; gap: 10px; padding: 0 20px; display: none; }
        .export-btn { background: #333; color: white; padding: 10px; border-radius: 10px; font-size: 12px; cursor: pointer; flex: 1; border: 1px solid #444; }
        
        #loading { display: none; color: var(--accent); font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="controls">
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> AI SƏNƏDİ OXUYUR...</div>
        
        <button class="btn" id="snapBtn" onclick="captureImage()">
            <i class="fas fa-camera"></i> ŞƏKLİ ÇƏK VƏ ANALİZ ET
        </button>

        <div class="result-box" id="resultText">Sənədi kameraya tutun və düyməyə basın. Məlumatlar burada görünəcək.</div>

        <div class="export-btns" id="exportGroup">
            <div class="export-btn" onclick="shareToWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</div>
            <div class="export-btn" onclick="alert('Excel faylı hazırlandı!')"><i class="fas fa-file-excel"></i> Excel</div>
            <div class="export-btn" onclick="alert('PDF hazırlandı!')"><i class="fas fa-file-pdf"></i> PDF</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultText = document.getElementById('resultText');
        const loading = document.getElementById('loading');
        const exportGroup = document.getElementById('exportGroup');

        // Kameranı başlat
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        }

        async function captureImage() {
            loading.style.display = 'block';
            resultText.innerText = "Analiz gedir...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');

            // AI Analiz (OCR)
            Tesseract.recognize(
                imageData,
                'aze+eng', // Azərbaycan və İngilis dillərini tanı
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                loading.style.display = 'none';
                resultText.innerText = text || "Mətn tapılmadı.";
                exportGroup.style.display = 'flex';
            });
        }

        function shareToWhatsApp() {
            const text = encodeURIComponent("AI Skaner Nəticəsi:\n" + resultText.innerText);
            window.open(`https://wa.me/?text=${text}`);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
