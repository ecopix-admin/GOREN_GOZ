<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive AI Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f2ff; --neon-red: #ff004c; --warning: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* Arxa Fon Kamerası */
        #mainCam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.7); }
        
        /* UI Qatları */
        .overlay { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom); }

        /* HUD: Sürət və GPS */
        .hud-top { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.3); }
        .speed-display { text-align: center; }
        .speed-value { font-size: 55px; font-weight: 900; color: var(--neon-blue); line-height: 1; }
        .speed-unit { font-size: 14px; color: var(--neon-blue); opacity: 0.8; display: block; }

        /* Radar Alert: KRİTİK */
        #radarBox { display: none; background: rgba(255, 0, 76, 0.9); border: 4px solid #fff; border-radius: 20px; padding: 20px; text-align: center; animation: pulse 0.5s infinite alternate; margin: 10px 0; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .radar-dist { font-size: 32px; font-weight: bold; }

        /* Yuxu və Diqqət */
        .face-monitor { position: fixed; bottom: 120px; right: 20px; width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--neon-blue); overflow: hidden; background: #000; }
        #selfieCam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Naviqasiya Alt Panel */
        .nav-panel { background: rgba(0,0,0,0.85); border-radius: 25px 25px 0 0; padding: 20px; border-top: 3px solid var(--neon-blue); }
        .instruction { font-size: 22px; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <video id="mainCam" autoplay playsinline muted></video>
    
    <div class="overlay">
        <div class="hud-top">
            <div id="status"><i class="fas fa-circle" style="color:var(--neon-blue)"></i> SİSTEM AKTİV</div>
            <div class="speed-display">
                <span class="speed-value" id="currentSpeed">0</span>
                <span class="speed-unit">KM/H</span>
            </div>
            <div id="clock">00:00</div>
        </div>

        <div id="radarBox">
            <i class="fas fa-camera-retro fa-2x"></i>
            <div class="radar-dist"><span id="distVal">300</span> METR</div>
            <div id="radarInfo">RADAR: 90 KM/H</div>
        </div>

        <div class="face-monitor">
            <video id="selfieCam" autoplay playsinline muted></video>
        </div>

        <div class="nav-panel">
            <div class="instruction">
                <i class="fas fa-arrow-up-right-from-square" style="color:var(--neon-blue)"></i>
                <span id="targetStreet">Zığ Şossesi istiqaməti</span>
            </div>
            <div style="opacity: 0.7; font-size: 14px;">Məsafə: 1.2 km | Tahmini: 4 dəq</div>
        </div>
    </div>

    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        // RADAR BAZASI (Koordinatlar)
        const radars = [
            { id: 1, name: "Zığ Şossesi", lat: 40.370, lng: 49.940, limit: 90 },
            { id: 2, name: "Aeroport Yolu", lat: 40.450, lng: 50.050, limit: 110 },
            { id: 3, name: "Yasamal", lat: 40.385, lng: 49.810, limit: 60 }
        ];

        const speedEl = document.getElementById('currentSpeed');
        const radarBox = document.getElementById('radarBox');
        const alertSnd = document.getElementById('alertSound');

        // 1. GPS VƏ SÜRAT (Gecikməsiz)
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(position => {
                const { latitude, longitude, speed } = position.coords;
                
                // Sürəti göstər (m/s to km/h)
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                speedEl.innerText = kmh;

                // Radar yoxlanışı
                checkRadars(latitude, longitude);
            }, err => console.error(err), { 
                enableHighAccuracy: true, 
                maximumAge: 0, 
                timeout: 5000 
            });
        }

        function checkRadars(myLat, myLng) {
            radars.forEach(radar => {
                const dist = getDistance(myLat, myLng, radar.lat, radar.lng);
                if (dist < 400) { // 400 metr qalmış xəbərdarlıq
                    radarBox.style.display = 'block';
                    document.getElementById('distVal').innerText = Math.round(dist);
                    document.getElementById('radarInfo').innerText = `RADAR: ${radar.limit} KM/H`;
                    
                    if (dist < 350 && !window.isBeeping) {
                        playVoice(`Diqqət! ${radar.limit} radarı yaxınlaşır.`);
                        window.isBeeping = true;
                    }
                } else {
                    radarBox.style.display = 'none';
                    window.isBeeping = false;
                }
            });
        }

        // Riyazi Məsafə Formulası (Haversine)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 2. KAMERALAR (Dual Camera Support)
        async function startCams() {
            try {
                const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('mainCam').srcObject = backStream;

                const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('selfieCam').srcObject = frontStream;
            } catch (e) { alert("Kameralara icazə verilmədi!"); }
        }

        // 3. SƏSLİ XƏBƏRDARLIQ
        function playVoice(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'az-AZ';
            window.speechSynthesis.speak(ut);
        }

        // Saatı yenilə
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        window.onload = startCams;
    </script>
</body>
</html>
