<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ | AR PLATFORM</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; }
        
        /* Giriş Paneli */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            transition: 0.5s;
        }

        /* Parlaq Kamera Düyməsi */
        .scan-btn {
            width: 120px; height: 120px; border-radius: 50%;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: 8px solid rgba(255,255,255,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(79, 172, 254, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
        }

        .title { margin-top: 20px; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .info { margin-top: 10px; color: #888; font-size: 14px; text-align: center; padding: 0 20px; }

        /* AR Aktiv olanda görünən alt panel */
        #ar-nav {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 50px;
            border: 1px solid #4facfe; z-index: 100;
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="scan-btn" onclick="startAR()">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="white">
                <path d="M9 3L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2h-3.17L15 3H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
        </div>
        <div class="title">GÖRƏN GÖZ</div>
        <div class="info">Kameranı açın və ətrafdakı rəqəmsal dünyanı kəşf edin</div>
    </div>

    <div id="ar-nav">Rəqəmsal İz Tapıldı!</div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 5;">

        <a-assets>
            <img id="tiktok-icon" src="https://img.icons8.com/color/512/tiktok.png">
        </a-assets>

        <a-camera gps-camera="minDistance: 5; simulateAltitude: 1.6" rotation-reader></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-cylinder position="0 0 0" radius="0.05" height="20" color="#4facfe" opacity="0.3"></a-cylinder>

            <a-entity position="0 1.6 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
                <a-image src="#tiktok-icon" width="2" height="2"></a-image>
                
                <a-plane position="0 -1.2 0.1" width="3" height="0.6" color="#000" opacity="0.9">
                    <a-text value="TIKTOK-U AC" align="center" width="5" color="#fff"></a-text>
                </a-plane>
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        function startAR() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('ar-nav').style.display = 'block';
            }, 500);
        }

        window.addEventListener('click', function() {
            if (document.getElementById('ui-layer').style.display === 'none') {
                window.location.href = "https://www.tiktok.com";
            }
        });
    </script>
</body>
</html>
