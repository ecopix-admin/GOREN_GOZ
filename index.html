<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ | MULTI-PLATFORM</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; }
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; background: #000; transition: 0.8s;
        }
        .scan-btn {
            width: 100px; height: 100px; border-radius: 50%;
            background: #fff; color: #000; border: none; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 20px #fff;
        }
        /* Alt tərəfdə hansı linkin aktiv olduğunu göstərən panel */
        #status-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: #000; padding: 10px 25px;
            border-radius: 30px; display: none; font-weight: bold; z-index: 100;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui-layer">
        <button class="scan-btn" onclick="startAR()">BAŞLA</button>
        <p style="color: white; margin-top: 15px;">GÖREN GÖZ PLATFORMASI</p>
    </div>

    <div id="status-bar" id="status-text">Obyekt axtarılır...</div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;">

        <a-assets>
            <img id="tk-icon" src="https://img.icons8.com/color/512/tiktok.png">
            <img id="ig-icon" src="https://img.icons8.com/color/512/instagram-new.png">
            <img id="tg-icon" src="https://img.icons8.com/color/512/telegram-app.png">
            <img id="tap-icon" src="https://www.google.com/s2/favicons?sz=64&domain=tap.az">
        </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            <a-entity position="0 1.5 0" scale="3 3 3" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
                <a-image src="#tk-icon" width="1" height="1" onclick="window.location.href='https://tiktok.com'"></a-image>
                <a-text value="TIKTOK" align="center" position="0 -0.8 0" width="4" color="#fff" wrap-count="15"></a-text>
            </a-entity>
        </a-entity>

        <a-entity gps-entity-place="latitude: 40.350600; longitude: 49.965400;">
            <a-entity position="0 1.5 0" scale="3 3 3" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
                <a-image src="#ig-icon" width="1" height="1" onclick="window.location.href='https://instagram.com'"></a-image>
                <a-text value="INSTAGRAM" align="center" position="0 -0.8 0" width="4" color="#fff"></a-text>
            </a-entity>
        </a-entity>

        <a-entity gps-entity-place="latitude: 40.350400; longitude: 49.965200;">
            <a-entity position="0 1.5 0" scale="3 3 3" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
                <a-image src="#tg-icon" width="1" height="1" onclick="window.location.href='https://t.me'"></a-image>
                <a-text value="TELEGRAM" align="center" position="0 -0.8 0" width="4" color="#fff"></a-text>
            </a-entity>
        </a-entity>

        <a-entity gps-entity-place="latitude: 40.350700; longitude: 49.965500;">
            <a-entity position="0 1.5 0" scale="3 3 3" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
                <a-image src="#tap-icon" width="1" height="1" onclick="window.location.href='https://tap.az'"></a-image>
                <a-text value="TAP.AZ" align="center" position="0 -0.8 0" width="4" color="#fff"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        function startAR() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').innerText = "Kameranı ətrafa tutun";
        }

        // Hər hansı bir obyektə toxunanda yönləndirmə
        window.addEventListener('click', function (evt) {
            // A-Frame-də obyekt kliklənməsini buraya da bağlamaq olar
        });
    </script>
</body>
</html>
