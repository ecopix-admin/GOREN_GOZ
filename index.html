<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | ADVANCED AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; }
        #loading-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; align-items: center; 
            justify-content: center; z-index: 1000; cursor: pointer;
        }
        .pulse-btn {
            width: 100px; height: 100px; border-radius: 50%; background: #00f2fe;
            border: none; box-shadow: 0 0 30px #00f2fe; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% {transform: scale(0.9);} 50% {transform: scale(1.1);} 100% {transform: scale(0.9);} }
    </style>
</head>

<body>

    <div id="loading-ui" onclick="this.style.display='none'">
        <div style="text-align: center;">
            <button class="pulse-btn">BAŞLA</button>
            <h2 style="margin-top: 20px;">GÖRƏN GÖZ PRO</h2>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smoothing: true; smoothingFactor: 10;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <img id="tk-icon" src="https://img.icons8.com/color/512/tiktok.png">
            <img id="user-photo" src="https://i.pravatar.cc/300"> </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader fov="80"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 1.5 0" scale="6 6 6" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                
                <a-image src="#tk-icon" width="1.2" height="1.2" class="clickable" 
                         onclick="window.location.href='https://tiktok.com'"></a-image>
                
                <a-circle src="#user-photo" radius="0.25" position="0 0 0.05" border="color: white; width: 2"></a-circle>
                
                <a-text value="SAMXAL VIDEO" align="center" position="0 -0.8 0.1" width="3" color="#fff"></a-text>
            </a-entity>

            <a-entity position="5 2 -5" scale="5 5 5" class="clickable" onclick="window.location.href='https://t.me'">
                <a-circle color="#0088cc" radius="0.5">
                    <a-text value="TELEGRAM" align="center" position="0 0 0.1" width="4"></a-text>
                </a-circle>
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        // Raycaster vasitəsilə obyektə dəqiq toxunuşu yoxlayırıq
        document.querySelector('a-scene').addEventListener('click', function (evt) {
            // Əgər loqoya basılsa, o öz onclick funksiyasını işə salacaq
        });
    </script>
</body>
</html>
